<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">

<title>MapaBase — Gestão de Inspeções Ambientais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- SDK do Supabase para Banco de Dados na Nuvem -->

<style>
:root{
  --bg:#F1F3EE;
  --surface:#FFFFFF;
  --surface-2:#E9ECE5;
  --ink:#16241C;
  --ink-soft:#546056;
  --ink-faint:#8A9389;
  --line:#D7DED2;
  --accent:#7ebf41; /* Verde MapaBase Ajustado */
  --accent-ink:#f0f8e9;
  --conforme:#2F9E44;
  --conforme-bg:#E9F7EC;
  --nc:#C4332C;
  --nc-bg:#FBEAE8;
  --na:#8A9389;
  --na-bg:#EEF0EA;
  --baixa:#5B9A78;
  --media:#D69E2E;
  --alta:#E2571D;
  --critica:#9B1C2E;
  --radius:10px;

  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--accent);color:#fff;}

summary::-webkit-details-marker { display:none; }
summary { list-style: none; }

/* ---------- TELA DE LOGIN ---------- */
#login-screen{
  position:fixed;inset:0;background:var(--ink);z-index:9999;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--surface);border-radius:12px;padding:36px 32px;
  width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);
  text-align:center;
}

/* ---------- SHELL LAYOUT ---------- */
#shell{
  display:flex;
  min-height:100vh;
}
#sidebar{
  width:220px;
  flex-shrink:0;
  background:var(--ink);
  color:#EDF1EA;
  display:flex;
  flex-direction:column;

  height:100vh;
}
.brand{

  flex-direction: column;
}
.brand-mark img {
  max-width: 100%;

}
.brand-sub{
  font-size:11px;

}
nav.mainnav{
  padding:14px 10px;
  display:flex;

  gap:2px;

  overflow-y:auto;
}
.navbtn{

  background:transparent;
  color:#C7D2C7;

.sidebar-foot{

#main{

  display:flex;

}
#content{
  flex:1;

.view-head{
  display:flex;

.view-title{

  line-height:1;

}
.view-sub{

.eyebrow{

  font-weight:600;

  margin-bottom:4px;
}

/* ---------- PRIMITIVES ---------- */
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--ink);
  font-size:14px;
  font-weight:600;
  white-space:nowrap;
}
.btn:hover{border-color:var(--ink-faint);}
.btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:var(--ink);
}
.btn.primary:hover{background:#6da838;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.danger{color:var(--nc);border-color:var(--nc-bg);}
.btn.sm{padding:6px 11px;font-size:12.5px;}

.card{

}
.card-pad{padding:20px;}

.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}

  .grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .grid.cols-2{grid-template-columns:1fr;}
}

.kpi{padding:18px 20px;}
.kpi .num{font-family:var(--font-display);font-size:38px;font-weight:600;line-height:1;}
.kpi .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}

.badge{

  border-radius:999px;

}
.badge.conforme{background:var(--conforme-bg);color:var(--conforme);}
.badge.nc{background:var(--nc-bg);color:var(--nc);}
.badge.na{background:var(--na-bg);color:var(--na);}
.badge.baixa{background:#E7F3EC;color:var(--baixa);}

.badge.alta{background:#FCE7DD;color:var(--alta);}
.badge.critica{background:#F7DEE1;color:var(--critica);}

.pill{

  padding:6px 13px;
  border-radius:999px;
  border:1px solid var(--line);

  font-size:13px;
  font-weight:500;
  color:var(--ink-soft);
}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;}

tr.clickable:hover{background:var(--surface-2);cursor:pointer;}

.empty{

}

input[type=text],input[type=email],input[type=password],input[type=datetime-local],input[type=number],select,textarea{

}
textarea{resize:vertical;min-height:64px;}
label.field-label{
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);

  display:block;
}
.field{margin-bottom:14px;}

.modal-backdrop{

}
.modal{

}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:22px;font-weight:600;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px 20px;display:flex;justify-content:flex-end;gap:10px;}

.toast{

  font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;
  transition:opacity .2s, transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

.chiprow{display:flex;flex-wrap:wrap;gap:8px;}
.chip{

  background:var(--surface);font-size:13.5px;font-weight:500;
}
.chip.sel{border-color:var(--accent);background:var(--accent-ink);color:var(--ink);}

.item-card{
  border:1px solid var(--line);border-radius:10px;background:var(--surface);

}
.item-top{padding:14px 16px;display:flex;gap:14px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;}
.item-num{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);margin-bottom:3px;display:block;}
.item-txt{font-size:14.5px;line-height:1.4;font-weight:500;}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-shrink:0;}
.seg button{
  border:none;background:var(--surface);padding:8px 13px;font-size:12.5px;font-weight:700;
  color:var(--ink-soft);border-right:1px solid var(--line);
}
.seg button:last-child{border-right:none;}
.seg button.c.active{background:var(--conforme);color:#fff;}
.seg button.n.active{background:var(--nc);color:#fff;}
.seg button.a.active{background:var(--na);color:#fff;}
.item-extra{padding:0 16px 16px;border-top:1px dashed var(--line);margin-top:0;padding-top:14px;}
.item-extra.hidden{display:none;}
.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{width:64px;height:64px;border-radius:7px;object-fit:cover;border:1px solid var(--line);}
.photo-add{
  width:64px;height:64px;border-radius:7px;border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink-faint);
  background:var(--surface-2);
}

.progressbar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
.progressbar > div{height:100%;background:var(--accent);transition:width .25s;}

.sticky-footer{
  position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);
  padding:12px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;
  margin-left:-34px;margin-right:-34px;padding-left:34px;padding-right:34px;
}

.steps{display:flex;gap:6px;margin-bottom:20px;}
.steps div{height:4px;flex:1;background:var(--line);border-radius:4px;}
.steps div.done{background:var(--accent);}

.hint{font-size:12px;color:var(--ink-faint);margin-top:4px;}
.rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.spacer{flex:1;}

@media(max-width:860px){
  #sidebar{
    position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;height:auto;
    flex-direction:row;z-index:50;box-shadow:0 -2px 14px rgba(0,0,0,.12);
  }
  .brand,.sidebar-foot{display:none;}
  nav.mainnav{flex-direction:row;padding:6px;overflow-x:auto;width:100%;}
  .navbtn{flex-direction:column;font-size:10px;padding:8px 10px;gap:3px;min-width:64px;}
  .navbtn .ic{font-size:17px;}
  #content{padding:18px 16px 90px;}
  .view-title{font-size:26px;}
  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr 1fr;}
  .sticky-footer{margin-left:-16px;margin-right:-16px;padding-left:16px;padding-right:16px;}
}

/* ---------- REGRAS DE IMPRESSÃO (PDF) ---------- */
@media print{
  .print-only-title { display:block !important; }
  #sidebar, .no-print, nav.mainnav, .view-head { display:none !important; }
  #content { padding:0; max-width:100%; width:100%; }

  .card { border:1px solid #ddd; box-shadow:none; }
  * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
  .badge { border:1px solid rgba(0,0,0,0.1); }
  @page { margin: 1cm; }
}
</style>

<body>

<!-- TELA DE LOGIN SEGURA VIA SUPABASE AUTH -->
<div id="login-screen">
  <div class="login-box">
    <div style="margin-bottom: 24px;">
      <img src="LOGO_VERT.png" alt="MapaBase Gestão Ambiental" style="max-width: 100%; height: auto; max-height: 80px; object-fit: contain;">
    </div>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:20px;">Acesso Restrito - Equipe de Inspeção</p>
    <div class="field" style="text-align:left;">
      <label class="field-label">E-mail Corporativo</label>
      <input type="email" id="login-email" placeholder="nome@mapabase.com.br">
    </div>
    <div class="field" style="text-align:left;">

    </div>
    <button class="btn primary" id="btn-entrar" style="width:100%;justify-content:center;margin-top:6px;">Entrar na Plataforma</button>
  </div>

<div id="shell">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <img src="LOGO_VERT.jpg" alt="MapaBase" style="max-height: 44px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
      </div>
      <div class="brand-sub">Banco de Dados em Nuvem Ativo</div>
    </div>
    <nav class="mainnav" id="mainnav"></nav>
    <div class="sidebar-foot">
      <div id="status-sync">Sincronizado via Supabase</div>
      <button class="btn ghost sm" id="btn-logout" style="margin-top:10px; width:100%; color: var(--ink-soft);">Sair do Sistema</button>
    </div>
  </aside>

  <div id="main">
    <div id="content"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="modal-root"></div>

<script>
/* ============================================================
   CONFIGURAÇÃO DO BANCO DE DADOS SUPABASE
   ============================================================ */
const SUPABASE_URL = 'https://luvxmuhtemyloljnqgif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dnhtdWh0ZW15bG9sam5xZ2lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTE1MzcsImV4cCI6MjEwMDEyNzUzN30.inJ4fIL8ayPeg57snqeMRjFFwbSB1tZrCWQh0ytjXLA';

const _supabase = (window.supabase && SUPABASE_URL) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

/* ============================================================
   ESTADO E PERSISTÊNCIA
   ============================================================ */
const state = {
  view: 'dashboard',
  empreendimentos: [],
  estruturas: [],
  vistoriasIndex: [],
  ready: false,
  novaVistoria: null,
  vistoriaAberta: null,
  dashFiltroEmp: '', // Filtro por Empreendimento no Painel
  dashFiltroMes: '', // Filtro por Data/Mês no Painel
  vistoriasConsolidadas: [], // Guarda as vistorias abertas para o PDF Total
  tituloConsolidado: ''
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function storageGet(key) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : null;
  } catch(e) { return null; }
}

async function storageSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch(e) { return false; }
}

/* --- SINCRONIZAÇÃO COMPLETA COM COMPATIBILIDADE DE SETOR --- */
async function syncGlobalNuvem(){
  if(!_supabase) return false;
  try {
    const [empReq, estReq] = await Promise.all([
      _supabase.from('empreendimentos').select('*'),
      _supabase.from('estruturas').select('*')
    ]);
    
    if(empReq.data && empReq.data.length > 0) {
      state.empreendimentos = empReq.data.map(d=>({id: d.id, nome: d.nome, tipo: d.tipo, estruturas: d.estruturas, criadoEm: d.criado_em}));
      await storageSet('empreendimentos', state.empreendimentos);
    }
    
    if(estReq.data && estReq.data.length > 0) {
      state.estruturas = estReq.data.map(d => {
        let itensArr = [];
        let setorVal = 'Geral';
        if (Array.isArray(d.itens)) {
          itensArr = d.itens;
          const def = DEFAULT_ESTRUTURAS.find(x => x.nome === d.nome);
          if (def) setorVal = def.setor;
        } else if (d.itens && typeof d.itens === 'object') {
          itensArr = d.itens.list || [];
          setorVal = d.itens.setor || 'Geral';
        }
        return { id: d.id, nome: d.nome, setor: setorVal, itens: itensArr };
      });
      await storageSet('estruturas', state.estruturas);
    }
    
    await loadVistoriasNuvem();
    return true;
  } catch(e) { console.error(e); return false; }
}

async function loadVistoriasNuvem(){
  if(_supabase){
    try{
      const { data, error } = await _supabase.from('vistorias').select('*').order('data_hora', { ascending: false });
      if(data && !error){
        state.vistoriasIndex = data.map(d => ({
          id: d.id,
          empreendimentoNome: d.empreendimento_nome,
          estruturaNome: d.estrutura_nome,
          responsavel: d.responsavel,
          dataHora: d.data_hora,
          totalItens: d.total_itens,
          totalNC: d.total_nc,
          criticidadeMax: d.criticidade_max,
          criticidades: (d.itens||[]).filter(i=>i.status==='nc').map(i=>i.criticidade)
        }));
        await storageSet('vistorias:index', state.vistoriasIndex);
      }
    }catch(e){}
  } else {
    state.vistoriasIndex = (await storageGet('vistorias:index')) || [];
  }
}

async function loadVistoria(id){ 
  if(_supabase){
    try{
      const { data } = await _supabase.from('vistorias').select('*').eq('id', id).single();
      if(data) return {
        id: data.id,
        empreendimentoNome: data.empreendimento_nome,
        estruturaNome: data.estrutura_nome,
        responsavel: data.responsavel,
        dataHora: data.data_hora,
        gps: data.gps,
        itens: data.itens
      };
    }catch(e){}
  }
  return await storageGet('vistoria:'+id); 
}

/* ============================================================
   FUNÇÕES PARA SALVAR E EXCLUIR VISTORIA NA NUVEM
   ============================================================ */
async function saveVistoria(v){
  const idx = state.vistoriasIndex.findIndex(x => x.id === v.id);
  const indexData = {
    id: v.id, empreendimentoNome: v.empreendimentoNome,
    estruturaNome: v.estruturaNome, responsavel: v.responsavel,
    dataHora: v.dataHora, totalItens: v.itens.length,
    totalNC: v.itens.filter(i=>i.status==='nc').length,
    criticidadeMax: v.itens.filter(i=>i.status==='nc').reduce((max,i)=> ({critica:4,alta:3,media:2,baixa:1}[i.criticidade]||0) > ({critica:4,alta:3,media:2,baixa:1}[max]||0) ? i.criticidade : max, null),
    criticidades: v.itens.filter(i=>i.status==='nc').map(i=>i.criticidade)
  };

  if(idx >= 0){
    state.vistoriasIndex[idx] = indexData;
  } else {
    state.vistoriasIndex.push(indexData);
  }

  await storageSet('vistorias:index', state.vistoriasIndex);
  await storageSet('vistoria:'+v.id, v);

  if(_supabase){
    const { error } = await _supabase.from('vistorias').upsert({
      id: v.id,
      empreendimento_nome: v.empreendimentoNome,
      estrutura_nome: v.estruturaNome,
      responsavel: v.responsavel,
      data_hora: v.dataHora,
      gps: v.gps,
      itens: v.itens,
      total_itens: v.itens.length,
      total_nc: v.itens.filter(i=>i.status==='nc').length,
      criticidade_max: indexData.criticidadeMax
    });
    if(error) {
      console.error("Erro no Supabase:", error);
      alert("Houve um erro ao enviar para a nuvem. Verifique sua internet.");
    }
  }
}

async function deleteVistoria(id){
  if(!confirm('Tem certeza de que deseja excluir esta vistoria? Esta ação não pode ser desfeita.')) return;
  showToast('Excluindo vistoria da Nuvem...');
  
  state.vistoriasIndex = state.vistoriasIndex.filter(v => v.id !== id);
  await storageSet('vistorias:index', state.vistoriasIndex);
  localStorage.removeItem('vistoria:'+id);

  if(_supabase){
    const { error } = await _supabase.from('vistorias').delete().eq('id', id);
    if(error){
      console.error("Erro ao excluir no Supabase:", error);
      alert("Erro ao excluir na nuvem.");
    }
  }

  state.vistoriaAberta = null;
  setView('vistorias');
  showToast('Vistoria excluída com sucesso.');
}

function editarVistoria(v){
  let emp = state.empreendimentos.find(e => e.nome === v.empreendimentoNome);
  let est = state.estruturas.find(e => e.nome === v.estruturaNome);
  
  const respostas = {};
  (v.itens || []).forEach(it => {
    respostas[it.itemId || it.id] = {
      status: it.status,
      observacao: it.observacao || '',
      criticidade: it.criticidade || 'media',
      recomendacao: it.recomendacao || '',
      fotos: it.fotos || []
    };
  });

  state.novaVistoria = {
    id: v.id,
    empreendimentoId: emp ? emp.id : null,
    estruturaId: est ? est.id : null,
    step: 3,
    respostas: respostas,
    gps: v.gps,
    responsavel: v.responsavel,
    dataHora: v.dataHora,
    itensOriginal: v.itens
  };

  setView('nova');
}

/* ============================================================
   GERAÇÃO DE PDF CONSOLIDADO (MULTÍPLAS VISTORIAS)
   ============================================================ */
window.openRelatorioConsolidado = async function(tipo, valor, empNome) {
  showToast('Preparando relatório em PDF, aguarde...');
  let indexVists = [];
  
  if(tipo === 'emp'){
     indexVists = state.vistoriasIndex.filter(v => v.empreendimentoNome === valor);
  } else if (tipo === 'mes') {
     indexVists = state.vistoriasIndex.filter(v => {
       if(v.empreendimentoNome !== empNome) return false;
       const d = new Date(v.dataHora);
       if(isNaN(d)) return false;
       const mesAno = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
       return (mesAno.charAt(0).toUpperCase() + mesAno.slice(1)) === valor;
     });
  }

  const fullVists = [];
  for(let idx of indexVists) {
    const v = await loadVistoria(idx.id);
    if(v) fullVists.push(v);
  }
  
  state.vistoriasConsolidadas = fullVists.sort((a,b)=> new Date(a.dataHora)-new Date(b.dataHora));
  state.tituloConsolidado = tipo === 'emp' ? `Relatório de Vistorias - ${valor}` : `Relatório Mensal - ${empNome} (${valor})`;
  setView('relatorio-consolidado');
};

/* ============================================================
   AUTENTICAÇÃO REAL E SEGURA NO SUPABASE
   ============================================================ */
async function checkAuth(){
  const loginScreen = document.getElementById('login-screen');
  
  if(!_supabase) {
    alert("AVISO: URL e Chave do Supabase não configuradas no código!");
    return;
  }

  const { data: { session } } = await _supabase.auth.getSession();
  
  if (session) {
    loginScreen.style.display = 'none';
    iniciarApp(); 
    return;
  }

  const loginEmail = document.getElementById('login-email');
  const loginInput = document.getElementById('login-pass');
  const btnEntrar = document.getElementById('btn-entrar');
  
  async function tentarLogin() {
    const email = loginEmail.value.trim().toLowerCase();
    const pass = loginInput.value;

    if (!email.endsWith('@mapabase.com.br')) {
      alert('Acesso negado: É obrigatório utilizar um e-mail com domínio @mapabase.com.br!');
      return;
    }

    btnEntrar.textContent = 'Autenticando...';
    btnEntrar.disabled = true;

    const { data, error } = await _supabase.auth.signInWithPassword({
      email: email,
      password: pass,
    });

    if (error) {
      alert('Falha no login. Verifique seu e-mail e senha.');
      btnEntrar.textContent = 'Entrar na Plataforma';
      btnEntrar.disabled = false;
    } else {
      loginScreen.style.display = 'none';
      iniciarApp();
    }
  }

  btnEntrar.onclick = tentarLogin;
  loginInput.addEventListener("keyup", function(event) {
    if (event.key === "Enter") tentarLogin();
  });
}

document.getElementById('btn-logout').onclick = async () => {
  if(_supabase) {
    await _supabase.auth.signOut();
    window.location.reload();
  }
};

/* ============================================================
   INICIALIZAÇÃO DO APP APÓS LOGIN BEM-SUCEDIDO
   ============================================================ */
async function iniciarApp(){
  showToast('Sincronizando com a Nuvem...');
  const syncOk = await syncGlobalNuvem();
  
  if(!syncOk){
    const emp = await storageGet('empreendimentos');
    const est = await storageGet('estruturas');
    state.empreendimentos = emp || [];
    state.estruturas = est || [];
  }

  if(state.estruturas.length === 0){
    state.estruturas = DEFAULT_ESTRUTURAS;
    if(_supabase) {
      for(let e of state.estruturas){
        const payloadItens = { setor: e.setor, list: e.itens };
        await _supabase.from('estruturas').upsert({id: e.id, nome: e.nome, itens: payloadItens});
      }
    }
    await storageSet('estruturas', state.estruturas);
  }
  
  state.ready = true;
  render();
}

/* ============================================================
   HELPERS DE UI E FUNÇÕES COMUNS
   ============================================================ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.remove('show'), 2200);
}

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function criticidadeLabel(c){ return {baixa:'Baixa',media:'Média',alta:'Alta',critica:'Crítica'}[c] || c; }

function estruturaById(id){ return state.estruturas.find(e=>e.id===id); }
function empreendimentoById(id){ return state.empreendimentos.find(e=>e.id===id); }

function setView(v){
  state.view = v;
  render();
  window.scrollTo(0,0);
}

function fileToCompressedDataURL(file, maxDim=800, quality=0.55){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = h*(maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = w*(maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function getGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
      () => resolve(null),
      { timeout: 6000 }
    );
  });
}

   ============================================================ */
const NAV = [
  {id:'dashboard', label:'Painel', ic:'&#9679;'},
  {id:'nova', label:'Nova vistoria', ic:'&#10133;'},
  {id:'vistorias', label:'Vistorias', ic:'&#128203;'},
  {id:'naoconformidades', label:'Não conformidades', ic:'&#9888;'},
  {id:'empreendimentos', label:'Empreendimentos', ic:'&#127970;'},
  {id:'estruturas', label:'Biblioteca de estruturas', ic:'&#128218;'},
];

function renderNav(){
  const el = document.getElementById('mainnav');
  el.innerHTML = NAV.map(n => `
    <button class="navbtn ${state.view===n.id?'active':''}" data-nav="${n.id}">
      <span class="ic">${n.ic}</span><span>${n.label}</span>
    </button>`).join('');
  
  el.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click', async ()=> {
      if(b.dataset.nav === 'nova') state.novaVistoria = null;
      
      if((b.dataset.nav === 'dashboard' || b.dataset.nav === 'vistorias') && _supabase){
        showToast('Atualizando dados da Nuvem...');
        await syncGlobalNuvem();
      }
      setView(b.dataset.nav);
    });
  });
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  renderNav();
  const c = document.getElementById('content');
  if(!state.ready){ c.innerHTML = '<div class="empty">Carregando…</div>'; return; }
  switch(state.view){
    case 'dashboard': c.innerHTML = viewDashboard(); bindDashboard(); break;
    case 'empreendimentos': c.innerHTML = viewEmpreendimentos(); bindEmpreendimentos(); break;
    case 'estruturas': c.innerHTML = viewEstruturas(); bindEstruturas(); break;
    case 'nova': c.innerHTML = viewNovaVistoria(); bindNovaVistoria(); break;
    case 'vistorias': c.innerHTML = viewVistorias(); bindVistorias(); break;
    case 'vistoria-detalhe': c.innerHTML = viewVistoriaDetalhe(); bindVistoriaDetalhe(); break;
    case 'relatorio-consolidado': c.innerHTML = viewRelatorioConsolidado(); bindRelatorioConsolidado(); break;
    case 'naoconformidades': c.innerHTML = viewNaoConformidades(); bindNaoConformidades(); break;
    default: c.innerHTML = '<div class="empty">Não encontrado</div>';
  }
}

/* ============================================================
   DASHBOARD CONSOLIDADO (COM FILTROS POR EMPREENDIMENTO E DATA)
   ============================================================ */
function viewDashboard(){
  let rows = [...state.vistoriasIndex];

  const empOptions = [...new Set(state.vistoriasIndex.map(v => v.empreendimentoNome || 'Sem Empreendimento'))].sort();
  
  const mesMap = {};
  state.vistoriasIndex.forEach(v => {
    const d = new Date(v.dataHora);
    if (!isNaN(d)) {
      const key = d.toISOString().slice(0, 7); 
      const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      const labelCap = label.charAt(0).toUpperCase() + label.slice(1);
      mesMap[key] = labelCap;
    }
  });
  const mesKeysSorted = Object.keys(mesMap).sort().reverse();

  if (state.dashFiltroEmp) {
    rows = rows.filter(v => (v.empreendimentoNome || 'Sem Empreendimento') === state.dashFiltroEmp);
  }

  if (state.dashFiltroMes) {
    rows = rows.filter(v => {
      const d = new Date(v.dataHora);
      return !isNaN(d) && d.toISOString().slice(0, 7) === state.dashFiltroMes;
    });
  }

  const total = rows.length;
  const totalItens = rows.reduce((s,v)=>s+(v.totalItens||0),0);
  const totalNC = rows.reduce((s,v)=>s+(v.totalNC||0),0);
  const conformidade = totalItens ? Math.round(100*(totalItens-totalNC)/totalItens) : 100;

  const porCrit = {baixa:0,media:0,alta:0,critica:0};
  rows.forEach(v=>{ (v.criticidades||[]).forEach(c=>{ if(porCrit[c]!==undefined) porCrit[c]++; }); });
  const maxCrit = Math.max(1,...Object.values(porCrit));

  const porEstrutura = {};
  rows.forEach(v=>{ porEstrutura[v.estruturaNome] = (porEstrutura[v.estruturaNome]||0) + (v.totalNC||0); });
  const rankEstrutura = Object.entries(porEstrutura).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxRank = Math.max(1,...rankEstrutura.map(r=>r[1]));

  const recentes = [...rows].sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora)).slice(0,6);

  return `
  <div class="view-head">
    <div>
      <div class="eyebrow">Visão geral</div>
      <h1 class="view-title">Painel de inspeções</h1>
      <div class="view-sub">Indicadores dinâmicos filtrados por empreendimento e período.</div>
    </div>
    <button class="btn primary" id="btn-nova-topo">+ Nova vistoria</button>
  </div>

  <div class="card card-pad" style="margin-bottom:20px; background:var(--surface-2);">
    <div class="grid cols-2" style="align-items:center;">
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Filtro por Empreendimento</label>
        <select id="dash-filter-emp">
          <option value="">🏢 Todos os Empreendimentos (${state.vistoriasIndex.length} vistorias)</option>
          ${empOptions.map(e => `<option value="${esc(e)}" ${state.dashFiltroEmp===e?'selected':''}>${esc(e)}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Filtro por Período / Mês</label>
        <select id="dash-filter-mes">
          <option value="">🗓️ Todas as Datas</option>
          ${mesKeysSorted.map(k => `<option value="${k}" ${state.dashFiltroMes===k?'selected':''}>${esc(mesMap[k])}</option>`).join('')}
        </select>
      </div>
    </div>
  </div>

  <div class="grid cols-4" style="margin-bottom:22px;">
    <div class="card kpi"><div class="num">${total}</div><div class="lbl">Vistorias filtradas</div></div>
    <div class="card kpi"><div class="num">${totalItens}</div><div class="lbl">Itens avaliados</div></div>
    <div class="card kpi" style="border-color:${totalNC?'var(--nc-bg)':'var(--line)'}"><div class="num" style="color:${totalNC?'var(--nc)':'var(--ink)'}">${totalNC}</div><div class="lbl">Não conformidades</div></div>
    <div class="card kpi"><div class="num">${conformidade}%</div><div class="lbl">Índice de conformidade</div></div>
  </div>

  <div class="grid cols-2" style="align-items:start;">
    <div class="card card-pad">
      <h3 style="margin:0 0 14px;font-family:var(--font-display);font-size:20px;font-weight:600;">Não conformidades por criticidade</h3>
      ${['critica','alta','media','baixa'].map(k=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:70px;font-size:12.5px;color:var(--ink-soft);">${criticidadeLabel(k)}</div>
          <div style="flex:1;background:var(--surface-2);border-radius:6px;height:16px;overflow:hidden;">
            <div style="width:${(porCrit[k]/maxCrit*100)||0}%;height:100%;background:var(--${k});"></div>
          </div>
          <div style="width:24px;text-align:right;font-family:var(--font-mono);font-size:12.5px;">${porCrit[k]}</div>
        </div>`).join('') || '<div class="hint">Sem dados para o filtro selecionado.</div>'}
    </div>
    <div class="card card-pad">
      <h3 style="margin:0 0 14px;font-family:var(--font-display);font-size:20px;font-weight:600;">Estruturas com mais não conformidades</h3>
      ${rankEstrutura.length ? rankEstrutura.map(([nome,n])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:150px;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(nome)}</div>
          <div style="flex:1;background:var(--surface-2);border-radius:6px;height:16px;overflow:hidden;">
            <div style="width:${(n/maxRank*100)}%;height:100%;background:var(--accent);"></div>
          </div>
          <div style="width:24px;text-align:right;font-family:var(--font-mono);font-size:12.5px;">${n}</div>
        </div>`).join('') : '<div class="hint">Sem dados para o filtro selecionado.</div>'}
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <div style="padding:16px 20px 0;"><h3 style="margin:0 0 4px;font-family:var(--font-display);font-size:20px;font-weight:600;">Vistorias Recentes (Filtro Ativo)</h3></div>
    ${recentes.length ? `<table style="margin-top:8px;"><thead><tr><th>Data</th><th>Empreendimento</th><th>Estrutura</th><th>Responsável</th><th>NC</th><th>Criticidade</th></tr></thead><tbody>
      ${recentes.map(v=>`
        <tr class="clickable" data-open="${v.id}">
          <td>${fmtDate(v.dataHora)}</td>
          <td>${esc(v.empreendimentoNome)}</td>
          <td>${esc(v.estruturaNome)}</td>
          <td>${esc(v.responsavel||'—')}</td>
          <td>${v.totalNC>0?`<span class="badge nc">${v.totalNC} NC</span>`:`<span class="badge conforme">OK</span>`}</td>
          <td>${v.criticidadeMax ? `<span class="badge ${v.criticidadeMax}">${criticidadeLabel(v.criticidadeMax)}</span>` : '—'}</td>
        </tr>`).join('')}
    </tbody></table>` : `<div class="empty"><div class="ic">&#128203;</div>Nenhuma vistoria encontrada para os filtros selecionados.<br><br><button class="btn primary" id="btn-nova-vazio">Iniciar primeira vistoria</button></div>`}
  </div>`;
}

function bindDashboard(){
  document.getElementById('btn-nova-topo')?.addEventListener('click', ()=>{ state.novaVistoria=null; setView('nova'); });
  document.getElementById('btn-nova-vazio')?.addEventListener('click', ()=>{ state.novaVistoria=null; setView('nova'); });
  
  document.getElementById('dash-filter-emp')?.addEventListener('change', (e)=>{
    state.dashFiltroEmp = e.target.value;
    render();
  });

  document.getElementById('dash-filter-mes')?.addEventListener('change', (e)=>{
    state.dashFiltroMes = e.target.value;
    render();
  });

  document.querySelectorAll('[data-open]').forEach(tr=>{
    tr.addEventListener('click', async ()=>{
      const v = await loadVistoria(tr.dataset.open);
      state.vistoriaAberta = v;
      setView('vistoria-detalhe');
    });
  });
}

        </div>
      </div>`).join('')}
  </div>` : `<div class="empty card"><div class="ic">&#127970;</div>Nenhum empreendimento cadastrado.<br><br><button class="btn primary" id="btn-novo-emp-vazio">Cadastrar empreendimento</button></div>`}
  `;
}

              const ests = state.estruturas.filter(e => (e.setor || 'Geral') === s.key);

              return `
                <div style="margin-top:12px;margin-bottom:6px;font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;">${s.titulo}</div>
                <div class="chiprow">
                  ${ests.map(e => `<button type="button" class="chip ${sel.has(e.id)?'sel':''}" data-est="${e.id}">${esc(e.nome)}</button>`).join('')}

      </div>

  </div>`;

  const close = ()=> modal.innerHTML='';
  document.getElementById('modal-close').onclick = close;
  document.getElementById('modal-cancel').onclick = close;
  document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });
  modal.querySelectorAll('[data-est]').forEach(b=>{
    b.onclick = ()=>{ b.classList.toggle('sel'); };
  });

  if(isEdit){
    document.getElementById('emp-del').onclick = async ()=>{
      if(!confirm('Excluir este empreendimento? As vistorias já realizadas serão mantidas.')) return;
      state.empreendimentos = state.empreendimentos.filter(e=>e.id!==existing.id);
      await storageSet('empreendimentos', state.empreendimentos);
      if(_supabase) await _supabase.from('empreendimentos').delete().eq('id', existing.id);
      close(); render(); showToast('Empreendimento excluído.');
    };
  }

  document.getElementById('emp-salvar').onclick = async ()=>{
    const nome = document.getElementById('emp-nome').value.trim();
    if(!nome){ showToast('Informe o nome do empreendimento.'); return; }
    const tipo = document.getElementById('emp-tipo').value;
    const estruturas = [...modal.querySelectorAll('[data-est].sel')].map(b=>b.dataset.est);
    
    let empObj;
    if(isEdit){
      Object.assign(existing, {nome, tipo, estruturas});
      empObj = existing;
    } else {
      empObj = { id: uid(), nome, tipo, estruturas, criadoEm: new Date().toISOString() };
      state.empreendimentos.push(empObj);
    }
    
    await storageSet('empreendimentos', state.empreendimentos);
    if(_supabase) {
      await _supabase.from('empreendimentos').upsert({ id: empObj.id, nome: empObj.nome, tipo: empObj.tipo, estruturas: empObj.estruturas, criado_em: empObj.criadoEm });
    }
    
    close(); render(); showToast('Empreendimento salvo.');
  };
}

function estruturaModal(existing){
  const isEdit = !!existing;
  let itens = isEdit ? existing.itens.map(i=>({...i})) : [];
  let modoBulk = false;
  const modal = document.getElementById('modal-root');

  function renderModalBody(){
    if(modoBulk){
      const textoLines = itens.map(i=> i.texto).join('\n');
      return `
        <div class="field">
          <label class="field-label">Cole suas perguntas abaixo (uma por linha)</label>
          <textarea id="est-bulk-txt" style="min-height:220px;font-family:var(--font-body);font-size:13px;line-height:1.5;" placeholder="Exemplo:\nHá extintores no local?\nExiste vazamento de óleo?\nOs resíduos estão segregados?">${esc(textoLines)}</textarea>
          <div class="hint" style="margin-top:6px;">Cada linha digitada ou colada se tornará um item no checklist.</div>
        </div>
      `;
    }

    return `
      <div id="itens-lista">
        ${itens.map((it,idx)=>`
          <div class="rowflex" style="margin-bottom:8px;align-items:center;" data-itemrow="${idx}">
            <div style="display:flex;flex-direction:column;gap:2px;">
              <button type="button" class="btn ghost sm" style="padding:2px 6px;" data-itemup="${idx}" ${idx===0?'disabled':''}>▲</button>
              <button type="button" class="btn ghost sm" style="padding:2px 6px;" data-itemdown="${idx}" ${idx===itens.length-1?'disabled':''}>▼</button>
            </div>
            <input type="text" value="${esc(it.texto)}" data-itemtxt="${idx}" placeholder="Pergunta do item de inspeção" style="flex:1;">
            <input type="text" value="${esc(it.categoria||'')}" data-itemcat="${idx}" placeholder="Categoria (opcional)" style="width:130px;">
            <button type="button" class="btn ghost sm danger" data-itemdel="${idx}">✕</button>
          </div>
        `).join('')}
      </div>
      <button type="button" class="btn ghost sm" id="est-add-item" style="margin-top:6px;">+ Adicionar item único</button>
    `;
  }

  modal.innerHTML = `
  <div class="modal-backdrop" id="modal-bg">
    <div class="modal" style="max-width:680px;">
      <div class="modal-head">
        <h3>${isEdit?'Editar Estrutura e Checklist':'Nova Estrutura'}</h3>
        <button class="btn ghost sm" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="grid cols-2" style="margin-bottom:12px;">
          <div class="field" style="margin-bottom:0;"><label class="field-label">Nome da Estrutura</label>
            <input type="text" id="est-nome" value="${esc(existing?.nome||'')}" placeholder="Ex.: Silo de Grãos"></div>
          <div class="field" style="margin-bottom:0;"><label class="field-label">Setor / Categoria</label>
            <select id="est-setor">
              <option value="Mineração" ${existing?.setor==='Mineração'?'selected':''}>⛏️ Mineração</option>
              <option value="Agro" ${existing?.setor==='Agro'?'selected':''}>🌱 Agronegócio</option>
              <option value="Geral" ${(existing?.setor||'Geral')==='Geral'?'selected':''}>⚙️ Comum / Geral</option>
            </select>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:8px;">
          <label class="field-label" style="margin:0;font-size:13px;font-weight:700;">Itens de Inspeção (${itens.length})</label>
          <div class="rowflex">
            <button type="button" class="btn ghost sm" id="btn-toggle-modo">${modoBulk ? '➔ Ver Lista Formatada' : '📋 Colar em Bloco (Texto)'}</button>
          </div>
        </div>

        <div id="est-body-container">${renderModalBody()}</div>
      </div>
      <div class="modal-foot">
        ${isEdit ? `
          <button type="button" class="btn danger" id="est-del">Excluir</button>
          <button type="button" class="btn ghost sm" id="est-dup">Duplicar</button>
        ` : ''}
        <div class="spacer"></div>
        <button type="button" class="btn ghost" id="modal-cancel">Cancelar</button>
        <button type="button" class="btn primary" id="est-salvar">Salvar na Nuvem</button>
      </div>
    </div>
  </div>`;

  const close = ()=> modal.innerHTML='';
  document.getElementById('modal-close').onclick = close;
  document.getElementById('modal-cancel').onclick = close;
  document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });

  function syncInputsToMemory(){
    if(!modoBulk){
      document.querySelectorAll('[data-itemtxt]').forEach(inp=>{
        const idx = +inp.dataset.itemtxt;
        if(itens[idx]) itens[idx].texto = inp.value;
      });
      document.querySelectorAll('[data-itemcat]').forEach(inp=>{
        const idx = +inp.dataset.itemcat;
        if(itens[idx]) itens[idx].categoria = inp.value;
      });
    } else {
      const area = document.getElementById('est-bulk-txt');
      if(area){
        const lines = area.value.split('\n').map(l=>l.trim()).filter(Boolean);
        itens = lines.map(l => ({ id: uid(), texto: l, categoria: null }));
      }
    }
  }

  function updateContainer(){
    document.getElementById('est-body-container').innerHTML = renderModalBody();
    bindContainerEvents();
  }

  function bindContainerEvents(){
    if(!modoBulk){
      document.querySelectorAll('[data-itemtxt]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemtxt].texto = inp.value; });
      document.querySelectorAll('[data-itemcat]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemcat].categoria = inp.value; });
      
      document.querySelectorAll('[data-itemdel]').forEach(b=> b.onclick = ()=>{ 
        syncInputsToMemory();
        itens.splice(+b.dataset.itemdel, 1); 
        updateContainer(); 
      });

      document.querySelectorAll('[data-itemup]').forEach(b=> b.onclick = ()=>{
        syncInputsToMemory();
        const idx = +b.dataset.itemup;
        if(idx > 0){
          const temp = itens[idx];
          itens[idx] = itens[idx-1];
          itens[idx-1] = temp;
          updateContainer();
        }
      });

      document.querySelectorAll('[data-itemdown]').forEach(b=> b.onclick = ()=>{
        syncInputsToMemory();
        const idx = +b.dataset.itemdown;
        if(idx < itens.length - 1){
          const temp = itens[idx];
          itens[idx] = itens[idx+1];
          itens[idx+1] = temp;
          updateContainer();
        }
      });

      document.getElementById('est-add-item')?.addEventListener('click', ()=>{
        syncInputsToMemory();
        itens.push({ id: uid(), texto: '', categoria: '' });
        updateContainer();
      });
    }
  }

  document.getElementById('btn-toggle-modo').onclick = ()=>{
    syncInputsToMemory();
    modoBulk = !modoBulk;
    document.getElementById('btn-toggle-modo').textContent = modoBulk ? '➔ Ver Lista Formatada' : '📋 Colar em Bloco (Texto)';
    updateContainer();
  };

  bindContainerEvents();

  if(isEdit){
    document.getElementById('est-del').onclick = async ()=>{
      if(!confirm('Excluir esta estrutura da biblioteca? Isso não afeta vistorias já realizadas.')) return;
      state.estruturas = state.estruturas.filter(e=>e.id!==existing.id);
      state.empreendimentos.forEach(e=> e.estruturas = e.estruturas.filter(id=>id!==existing.id));
      
      await storageSet('estruturas', state.estruturas);
      await storageSet('empreendimentos', state.empreendimentos);
      if(_supabase) await _supabase.from('estruturas').delete().eq('id', existing.id);
      
      close(); render(); showToast('Estrutura excluída.');
    };

    document.getElementById('est-dup').onclick = async ()=>{
      syncInputsToMemory();
      const novoNome = (document.getElementById('est-nome').value.trim() || existing.nome) + ' (Cópia)';
      const novoSetor = document.getElementById('est-setor').value;
      const copia = { id: uid(), nome: novoNome, setor: novoSetor, itens: JSON.parse(JSON.stringify(itens)) };
      
      state.estruturas.push(copia);
      await storageSet('estruturas', state.estruturas);
      if(_supabase) {
        const payloadItens = { setor: copia.setor, list: copia.itens };
        await _supabase.from('estruturas').upsert({ id: copia.id, nome: copia.nome, itens: payloadItens });
      }
      close(); render(); showToast('Cópia criada com sucesso!');
    };
  }

  document.getElementById('est-salvar').onclick = async ()=>{
    syncInputsToMemory();
    const nome = document.getElementById('est-nome').value.trim();
    if(!nome){ showToast('Informe o nome da estrutura.'); return; }
    const setor = document.getElementById('est-setor').value;
    const itensLimpos = itens.filter(i=>i.texto.trim()).map(i=>({ id: i.id||uid(), texto: i.texto.trim(), categoria: i.categoria?.trim()||null }));
    
    let estObj;
    if(isEdit){ 
      Object.assign(existing, { nome, setor, itens: itensLimpos }); 
      estObj = existing;
    } else { 
      estObj = { id: uid(), nome, setor, itens: itensLimpos };
      state.estruturas.push(estObj); 
    }
    
    await storageSet('estruturas', state.estruturas);
    if(_supabase) {
      const payloadItens = { setor: estObj.setor, list: estObj.itens };
      await _supabase.from('estruturas').upsert({ id: estObj.id, nome: estObj.nome, itens: payloadItens });
    }
    
    close(); render(); showToast('Estrutura e checklist salvos na Nuvem!');
  };
}

function bindEstruturas(){
  document.getElementById('btn-nova-estrutura')?.addEventListener('click', ()=>estruturaModal(null));
  
  document.getElementById('btn-reset-estrutura')?.addEventListener('click', async ()=>{
    if(!confirm('ATENÇÃO: Isso vai restaurar a biblioteca para o padrão original da MapaBase. Confirma?')) return;
    showToast('Restaurando nuvem...');
    
    if(_supabase) {
       const { data } = await _supabase.from('estruturas').select('id');
       if(data && data.length) {
          const ids = data.map(d=>d.id);
          await _supabase.from('estruturas').delete().in('id', ids);
       }
    }
    state.estruturas = DEFAULT_ESTRUTURAS;
    await storageSet('estruturas', state.estruturas);
    
    if(_supabase) {
      for(let e of state.estruturas){
        const payloadItens = { setor: e.setor, list: e.itens };
        await _supabase.from('estruturas').upsert({id: e.id, nome: e.nome, itens: payloadItens});
      }
    }
    render();
    showToast('Biblioteca restaurada com sucesso!');
  });

  document.querySelectorAll('[data-editest]').forEach(b=>{
    b.addEventListener('click', ()=> estruturaModal(estruturaById(b.dataset.editest)));
  });
}

/* ============================================================
   NOVA VISTORIA OU EDIÇÃO
   ============================================================ */
function viewNovaVistoria(){
  const nv = state.novaVistoria;
  if(!nv || nv.step===1){
    return `
    <div class="view-head"><div><div class="eyebrow">Nova vistoria</div><h1 class="view-title">Selecione o empreendimento</h1></div></div>
    <div class="steps"><div class="done"></div><div></div><div></div></div>
    ${state.empreendimentos.length ? `<div class="grid cols-3">
      ${state.empreendimentos.map(e=>`
        <div class="card card-pad clickable" data-pickemp="${e.id}" style="cursor:pointer;">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${esc(e.nome)}</div>
          <div class="hint" style="margin-top:4px;">${e.estruturas.length} estrutura(s) disponível(is)</div>
        </div>`).join('')}
    </div>` : `<div class="empty card"><div class="ic">&#127970;</div>Cadastre um empreendimento antes de iniciar uma vistoria.<br><br><button class="btn primary" id="btn-ir-emp">Cadastrar empreendimento</button></div>`}
    `;
  }
  if(nv.step===2){
    const emp = empreendimentoById(nv.empreendimentoId);
    const opts = emp.estruturas.map(id=>estruturaById(id)).filter(Boolean);
    return `
    <div class="view-head"><div><div class="eyebrow">${esc(emp.nome)}</div><h1 class="view-title">Selecione a estrutura</h1></div>
    <button class="btn ghost" id="btn-voltar-1">← Trocar empreendimento</button></div>
    <div class="steps"><div class="done"></div><div class="done"></div><div></div></div>
    ${opts.length ? `<div class="grid cols-3">
      ${opts.map(e=>`
        <div class="card card-pad" data-pickest="${e.id}" style="cursor:pointer;">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${esc(e.nome)}</div>
          <div class="hint" style="margin-top:4px;">${e.itens.length} item(ns) de checklist</div>
        </div>`).join('')}
    </div>` : `<div class="empty card"><div class="ic">&#128218;</div>Este empreendimento ainda não tem estruturas vinculadas.<br><br><button class="btn primary" id="btn-editar-emp-estruturas">Vincular estruturas</button></div>`}
    `;
  }
  
  // Step 3 - Checklist
  const emp = empreendimentoById(nv.empreendimentoId) || { nome: nv.empreendimentoNome || 'Empreendimento' };
  const est = estruturaById(nv.estruturaId) || { nome: nv.estruturaNome || 'Estrutura', itens: [] };
  
  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []);
  if(!itensLista.length && nv.respostas){
    itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null }));
  }

  const respondidos = itensLista.filter(it => nv.respostas[it.id]?.status).length;
  const pct = itensLista.length ? Math.round(100*respondidos/itensLista.length) : 0;

  let categorias = [...new Set(itensLista.map(i=>i.categoria).filter(Boolean))];
  let itensPorCat = categorias.length ? categorias.map(c=>({cat:c, itens: itensLista.filter(i=>i.categoria===c)})) : [{cat:null, itens: itensLista}];

  let dataHoraFormatted = '';
  if (nv.dataHora) {
    dataHoraFormatted = nv.dataHora.slice(0, 16);
  }

  return `
  <div class="view-head">
    <div><div class="eyebrow">${esc(emp.nome)} · ${esc(est.nome)}</div><h1 class="view-title">${nv.id ? 'Editar Vistoria' : 'Checklist de inspeção'}</h1></div>
    ${!nv.id ? `<button class="btn ghost" id="btn-voltar-2">← Trocar estrutura</button>` : ''}
  </div>
  <div class="steps"><div class="done"></div><div class="done"></div><div class="done"></div></div>

  <div class="card card-pad" style="margin-bottom:16px;">
    <div class="grid cols-3">
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Data e Hora da Vistoria</label>
        <input type="datetime-local" id="nv-datahora" value="${dataHoraFormatted}">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Responsável pela vistoria</label>
        <input type="text" id="nv-responsavel" value="${esc(nv.responsavel||'')}" placeholder="Nome do inspetor">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Localização (GPS)</label>
        <div class="rowflex">
          <span class="hint" id="nv-gps-txt" style="margin:0;">${nv.gps? `${nv.gps.lat.toFixed(5)}, ${nv.gps.lng.toFixed(5)}` : 'Não capturada'}</span>
          <button class="btn ghost sm" id="nv-gps-btn" type="button">${nv.gps?'Recapturar':'Capturar GPS'}</button>
        </div>
      </div>
    </div>
  </div>

  <div class="rowflex" style="margin-bottom:14px;">
    <div class="progressbar" style="flex:1;"><div style="width:${pct}%"></div></div>
    <div class="hint" style="white-space:nowrap;">${respondidos}/${itensLista.length} respondidos</div>
  </div>

  ${itensPorCat.map(grupo=>`

  const r = nv.respostas[it.id] || { status:null, observacao:'', criticidade:'media', recomendacao:'', fotos:[] };
  nv.respostas[it.id] = r;
  const showExtra = r.status === 'nc';
  return `
  <div class="item-card" data-itemid="${it.id}">
    <div class="item-top">
      <div style="flex:1;min-width:200px;">
        <span class="item-num">ITEM ${numero}</span>
        <div class="item-txt">${esc(it.texto)}</div>
      </div>
      <div class="seg" data-seg="${it.id}">
        <button type="button" class="c ${r.status==='conforme'?'active':''}" data-status="conforme">CONFORME</button>
        <button type="button" class="n ${r.status==='nc'?'active':''}" data-status="nc">NÃO CONF.</button>
        <button type="button" class="a ${r.status==='na'?'active':''}" data-status="na">N/A</button>
      </div>
    </div>
    <div class="item-extra ${showExtra?'':'hidden'}" data-extra="${it.id}">
      <div class="field" style="margin-bottom:10px;">
        <label class="field-label">Observação</label>
        <textarea data-obs="${it.id}" placeholder="Descreva a não conformidade observada...">${esc(r.observacao)}</textarea>
      </div>
      <div class="grid cols-2">
        <div class="field" style="margin-bottom:10px;">
          <label class="field-label">Criticidade</label>
          <select data-crit="${it.id}">
            ${['baixa','media','alta','critica'].map(c=>`<option value="${c}" ${r.criticidade===c?'selected':''}>${criticidadeLabel(c)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin-bottom:10px;">
          <label class="field-label">Recomendação técnica</label>
          <input type="text" data-rec="${it.id}" value="${esc(r.recomendacao)}" placeholder="Ação corretiva sugerida">
        </div>
      </div>
      <label class="field-label">Fotos (Câmera ou Galeria)</label>
      <div class="photo-row" data-photos="${it.id}">
        ${r.fotos.map((f,i)=>`<img class="photo-thumb" src="${f}" data-photoidx="${i}">`).join('')}
        <label class="photo-add">＋<input type="file" accept="image/*" multiple data-photoinput="${it.id}" style="display:none;"></label>
      </div>
    </div>
  </div>`;
}

function bindNovaVistoria(){
  const nv = state.novaVistoria;
  if(!nv || nv.step===1){
    document.querySelectorAll('[data-pickemp]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.novaVistoria = { empreendimentoId: el.dataset.pickemp, estruturaId:null, step:2, respostas:{}, gps:null, responsavel:'', dataHora: '' };
        render();
      });
    });
    document.getElementById('btn-ir-emp')?.addEventListener('click', ()=> setView('empreendimentos'));
    return;
  }
  if(nv.step===2){
    document.getElementById('btn-voltar-1')?.addEventListener('click', ()=>{ nv.step=1; render(); });
    document.getElementById('btn-editar-emp-estruturas')?.addEventListener('click', ()=>{
      empreendimentoModal(empreendimentoById(nv.empreendimentoId));
    });
    document.querySelectorAll('[data-pickest]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        nv.estruturaId = el.dataset.pickest;
        nv.step = 3;
        render();
        const gps = await getGPS();
        if(gps){ nv.gps = gps; if(state.view==='nova') render(); }
      });
    });
    return;
  }
  // Step 3
  document.getElementById('btn-voltar-2')?.addEventListener('click', ()=>{ nv.step=2; render(); });
  document.getElementById('nv-responsavel')?.addEventListener('input', e=>{ nv.responsavel = e.target.value; });
  document.getElementById('nv-datahora')?.addEventListener('change', e=>{ 
    if(e.target.value) nv.dataHora = new Date(e.target.value).toISOString(); 
  });
  document.getElementById('nv-gps-btn')?.addEventListener('click', async ()=>{
    document.getElementById('nv-gps-txt').textContent = 'Capturando...';
    const gps = await getGPS();
    nv.gps = gps;
    document.getElementById('nv-gps-txt').textContent = gps ? `${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)}` : 'Indisponível neste dispositivo/navegador';
  });

  document.querySelectorAll('[data-seg]').forEach(seg=>{
    seg.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = seg.dataset.seg;
        state.novaVistoria.respostas[id].status = btn.dataset.status;
        render();
      });
    });
  });
  document.querySelectorAll('[data-obs]').forEach(t=> t.addEventListener('input', e=>{ nv.respostas[t.dataset.obs].observacao = e.target.value; }));
  document.querySelectorAll('[data-crit]').forEach(s=> s.addEventListener('change', e=>{ nv.respostas[s.dataset.crit].criticidade = e.target.value; }));
  document.querySelectorAll('[data-rec]').forEach(i=> i.addEventListener('input', e=>{ nv.respostas[i.dataset.rec].recomendacao = e.target.value; }));
  document.querySelectorAll('[data-photoinput]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const id = inp.dataset.photoinput;
      const files = [...inp.files];
      showToast('Processando foto(s)...');
      for(const f of files){
        try{
          const dataUrl = await fileToCompressedDataURL(f);
          nv.respostas[id].fotos.push(dataUrl);
        }catch(e){ console.error(e); }
      }
      render();
    });
  });
  document.querySelectorAll('[data-photoidx]').forEach(img=>{
    img.addEventListener('click', ()=>{
      const wrap = img.closest('[data-photos]');
      const id = wrap.dataset.photos;
      if(confirm('Remover esta foto?')){
        nv.respostas[id].fotos.splice(+img.dataset.photoidx,1);
        render();
      }
    });
  });

  document.getElementById('nv-finalizar')?.addEventListener('click', finalizarVistoria);
}

async function finalizarVistoria(){
  const nv = state.novaVistoria;
  const emp = empreendimentoById(nv.empreendimentoId) || { id: nv.empreendimentoId, nome: nv.empreendimentoNome || 'Empreendimento' };
  const est = estruturaById(nv.estruturaId) || { id: nv.estruturaId, nome: nv.estruturaNome || 'Estrutura', itens: [] };
  const btn = document.getElementById('nv-finalizar');
  
  if (!nv.dataHora) {
    showToast('Por favor, informe a Data e Hora da Vistoria.');
    return;
  }
  
  btn.disabled = true; btn.textContent = 'Enviando para a Nuvem...';

  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []);
  if(!itensLista.length && nv.respostas){
    itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null }));
  }

  const itensResp = itensLista.map(it=>{
    const r = nv.respostas[it.id] || {status:null};
    return {
      itemId: it.id, texto: it.texto, categoria: it.categoria,
      status: r.status || 'na',
      observacao: r.observacao || '',
      criticidade: r.status==='nc' ? (r.criticidade||'media') : null,
      recomendacao: r.status==='nc' ? (r.recomendacao||'') : '',
      fotos: r.fotos || [],
    };
  });

  const vistoria = {
    id: nv.id || uid(),
    empreendimentoId: emp.id, empreendimentoNome: emp.nome,
    estruturaId: est.id, estruturaNome: est.nome,
    responsavel: nv.responsavel || '—',
    dataHora: nv.dataHora,
    gps: nv.gps,
    itens: itensResp,
  };
  
  await saveVistoria(vistoria);
  await loadVistoriasNuvem();

  state.novaVistoria = null;
  state.vistoriaAberta = vistoria;
  setView('vistoria-detalhe');
  showToast('Vistoria salva com sucesso na Nuvem!');
}

async function bindNaoConformidades(){
  const withNC = state.vistoriasIndex.filter(v=>v.totalNC>0).sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora));
  const ncList = [];
  
  for(const idx of withNC){
    const v = await loadVistoria(idx.id);
    if(!v) continue;
    v.itens.filter(i=>i.status==='nc').forEach(it=>{
      ncList.push({ vistoriaId: v.id, empreendimento: v.empreendimentoNome, estrutura: v.estruturaNome, dataHora: v.dataHora, responsavel: v.responsavel, ...it });
    });
  }
  
  const el = document.getElementById('nc-list');
  if(!el) return;
  if(!ncList.length){ el.innerHTML = '<div class="empty card"><div class="ic">&#10004;</div>Nenhuma não conformidade registrada no banco de dados.</div>'; return; }

  // Agrupa as NCs por Empreendimento -> Vistoria
  const porEmp = {};
  ncList.forEach(nc => {
    if(!porEmp[nc.empreendimento]) porEmp[nc.empreendimento] = {};
    const vistKey = nc.vistoriaId;
    if(!porEmp[nc.empreendimento][vistKey]) porEmp[nc.empreendimento][vistKey] = { id: nc.vistoriaId, dataHora: nc.dataHora, estrutura: nc.estrutura, responsavel: nc.responsavel, itens: [] };

    html += `

    for(const vData of vistoriasArray){
      vData.itens.sort((a,b)=> ({critica:4,alta:3,media:2,baixa:1}[b.criticidade]||0) - ({critica:4,alta:3,media:2,baixa:1}[a.criticidade]||0));

      html += `

            <span>🛠️ ${esc(vData.estrutura)}</span>
            <span style="color:var(--ink-soft); font-weight:600;">🗓️ Data: ${fmtDate(vData.dataHora)}</span>
          </div>
          <div class="card" style="overflow-x:auto; box-shadow:none;">
            <table>
              <thead><tr><th style="width:80px;">Criticidade</th><th>Item apontado (Não Conforme)</th><th>Observação Registrada</th><th>Recomendação Técnica</th><th class="no-print" style="width:60px;">Ação</th></tr></thead>
              <tbody>
                ${vData.itens.map(r=>`
                  <tr style="break-inside: avoid;">
                    <td><span class="badge ${r.criticidade}">${criticidadeLabel(r.criticidade)}</span></td>
                    <td style="max-width:280px; font-weight:500;">${esc(r.texto)}</td>
                    <td style="max-width:220px; font-size:12.5px; color:var(--ink-soft);">${esc(r.observacao)||'—'}</td>
                    <td style="max-width:220px; font-size:12.5px; color:var(--ink-soft);">${esc(r.recomendacao)||'—'}</td>
                    <td class="no-print"><button class="btn ghost sm" data-openvist="${r.vistoriaId}">Ver Relatório</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }
    html += `</div></details>`;
  }
  html += '</div>';
  el.innerHTML = html;

  el.querySelectorAll('[data-openvist]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const v = await loadVistoria(btn.dataset.openvist);
      state.vistoriaAberta = v;
      setView('vistoria-detalhe');
    });
  });
}

// Inicializa a camada de Segurança antes do App carregar
checkAuth();
</script>
</body>
</html>
