<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MapaBase — Gestão de Inspeções Ambientais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- SDK do Supabase para Banco de Dados na Nuvem -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Biblioteca Chart.js para o Gráfico de Evolução -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#F1F3EE;
  --surface:#FFFFFF;
  --surface-2:#E9ECE5;
  --ink:#16241C;
  --ink-soft:#546056;
  --ink-faint:#8A9389;
  --line:#D7DED2;
  --accent:#7ebf41; 
  --accent-ink:#f0f8e9;
  --conforme:#2F9E44;
  --conforme-bg:#E9F7EC;
  --nc:#C4332C;
  --nc-bg:#FBEAE8;
  --na:#8A9389;
  --na-bg:#EEF0EA;
  --baixa:#5B9A78;
  --media:#D69E2E;
  --alta:#E2571D;
  --critica:#9B1C2E;
  --radius:10px;
  --shadow:0 1px 2px rgba(22,36,28,.06), 0 2px 12px rgba(22,36,28,.05);
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--accent);color:#fff;}
summary::-webkit-details-marker { display:none; }
summary { list-style: none; }

#login-screen{
  position:fixed;inset:0;background:var(--ink);z-index:9999;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--surface);border-radius:12px;padding:36px 32px;
  width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);
  text-align:center;
}
#shell{display:flex;min-height:100vh;}
#sidebar{
  width:220px;flex-shrink:0;background:var(--ink);color:#EDF1EA;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;}
.brand-mark img {max-width:100%;height:auto;max-height:40px;object-fit:contain;}
.brand-sub{font-size:11px;color:#9FB0A2;margin-top:8px;letter-spacing:.06em;text-transform:uppercase;}
nav.mainnav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.navbtn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;
  background:transparent;color:#C7D2C7;border-radius:8px;font-size:14.5px;
  font-weight:500;text-align:left;transition:background .12s, color .12s;
}
.navbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
.navbtn.active{background:var(--accent);color:var(--ink);font-weight:600;}
.navbtn .ic{width:18px;text-align:center;flex-shrink:0;opacity:.9;}
.sidebar-foot{padding:14px 20px 18px;font-size:11px;color:#7C8C7E;border-top:1px solid rgba(255,255,255,.08);}

#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#content{flex:1;padding:28px 34px 90px;max-width:1180px;width:100%;}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.view-title{font-family:var(--font-display);font-size:32px;font-weight:600;line-height:1;margin:0;}
.view-sub{color:var(--ink-soft);font-size:14px;margin-top:6px;}
.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);
  font-size:14px;font-weight:600;white-space:nowrap;justify-content:center;
}
.btn:hover{border-color:var(--ink-faint);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--ink);}
.btn.primary:hover{background:#6da838;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.danger{color:var(--nc);border-color:var(--nc-bg);}
.btn.sm{padding:6px 11px;font-size:12.5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:20px;}

.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}

.kpi{padding:18px 20px;}
.kpi .num{font-family:var(--font-display);font-size:38px;font-weight:600;line-height:1;}
.kpi .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.01em;}
.badge.conforme{background:var(--conforme-bg);color:var(--conforme);}
.badge.nc{background:var(--nc-bg);color:var(--nc);}
.badge.na{background:var(--na-bg);color:var(--na);}
.badge.baixa{background:#E7F3EC;color:var(--baixa);}
.badge.media{background:#FBF1DC;color:#9A7415;}
.badge.alta{background:#FCE7DD;color:var(--alta);}
.badge.critica{background:#F7DEE1;color:var(--critica);}
.badge.pending{background:#FFF3CD;color:#975A16; border:1px solid #F6E05E;}

.pill{display:inline-flex;padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:500;color:var(--ink-soft);}

.table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 600px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-faint); padding: 8px 10px; border-bottom: 1px solid var(--line); }
td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.clickable:hover { background: var(--surface-2); cursor: pointer; }

.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty .ic{font-size:34px;margin-bottom:10px;}

input[type=text],input[type=email],input[type=password],input[type=datetime-local],input[type=number],select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:var(--surface);font-size:14px;color:var(--ink);
}
textarea{resize:vertical;min-height:64px;}
label.field-label{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;display:block;}
.field{margin-bottom:14px;}

.modal-backdrop{position:fixed;inset:0;background:rgba(22,36,28,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--surface);border-radius:12px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:22px;font-weight:600;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px 20px;display:flex;justify-content:flex-end;gap:10px;}

.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;
  font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

.chiprow{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);font-size:13.5px;font-weight:500;}
.chip.sel{border-color:var(--accent);background:var(--accent-ink);color:var(--ink);}

.item-card{border:1px solid var(--line);border-radius:10px;background:var(--surface);margin-bottom:10px;overflow:hidden;}
.item-top{padding:14px 16px;display:flex;gap:14px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;}
.item-num{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);margin-bottom:3px;display:block;}
.item-txt{font-size:14.5px;line-height:1.4;font-weight:500;}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;flex-shrink:0;}
.seg button{border:none;background:var(--surface);padding:8px 13px;font-size:12.5px;font-weight:700;color:var(--ink-soft);border-right:1px solid var(--line);}
.seg button:last-child{border-right:none;}
.seg button.c.active{background:var(--conforme);color:#fff;}
.seg button.n.active{background:var(--nc);color:#fff;}
.seg button.a.active{background:var(--na);color:#fff;}
.item-extra{padding:0 16px 16px;border-top:1px dashed var(--line);margin-top:0;padding-top:14px;}
.item-extra.hidden{display:none;}
.nc-fields.hidden{display:none;}
.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-thumb{width:64px;height:64px;border-radius:7px;object-fit:cover;border:1px solid var(--line);}
.photo-add{width:64px;height:64px;border-radius:7px;border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink-faint);background:var(--surface-2);}

.progressbar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
.progressbar > div{height:100%;background:var(--accent);transition:width .25s;}

.sticky-footer{
  position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);padding:12px 0;display:flex;
  justify-content:space-between;align-items:center;gap:16px;margin-left:-34px;margin-right:-34px;padding-left:34px;padding-right:34px;
}

.steps{display:flex;gap:6px;margin-bottom:20px;}
.steps div{height:4px;flex:1;background:var(--line);border-radius:4px;}
.steps div.done{background:var(--accent);}

.hint{font-size:12px;color:var(--ink-faint);margin-top:4px;}
.rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.spacer{flex:1;}

@media(max-width:860px){
  #sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;height:auto;flex-direction:row;z-index:50;box-shadow:0 -2px 14px rgba(0,0,0,.12);}
  .brand,.sidebar-foot{display:none;}
  nav.mainnav{flex-direction:row; padding:6px; overflow-x:auto; width:100%; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;}
  .navbtn{flex-direction:column;font-size:10px;padding:8px 10px;gap:3px;min-width:64px; scroll-snap-align: start;}
  .navbtn .ic{font-size:17px;}
  #content{padding:18px 16px 90px;}
  .view-title{font-size:26px;}
  .grid.cols-4, .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
  .item-top { flex-direction: column; gap: 12px; }
  .seg { width: 100%; display: flex; }
  .seg button { flex: 1; text-align: center; padding: 12px 0; font-size: 11.5px;}
  .view-head .rowflex { width: 100%; flex-direction: column; align-items: stretch; }
  .view-head .rowflex button { width: 100%; }
  .sticky-footer{margin-left:-16px;margin-right:-16px;padding-left:16px;padding-right:16px; flex-direction: column; text-align: center;}
  .sticky-footer button { width: 100%; }
}

@media print{
  .print-only-title { display:block !important; }
  #sidebar, .no-print, nav.mainnav, .view-head { display:none !important; }
  #content { padding:0; max-width:100%; width:100%; }
  body { background:#fff; margin:0; }
  .card { border:1px solid #ddd; box-shadow:none; }
  .table-wrapper { overflow: visible !important; }
  table { min-width: 100%; }
  * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
  .badge { border:1px solid rgba(0,0,0,0.1); }
  @page { margin: 1cm; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="margin-bottom: 24px;">
      <img src="LOGO_VERT.png" alt="MapaBase Gestão Ambiental" style="max-width: 100%; height: auto; max-height: 80px; object-fit: contain;">
    </div>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:20px;">Acesso Restrito - Equipe de Inspeção</p>
    <div class="field" style="text-align:left;">
      <label class="field-label">E-mail Corporativo</label>
      <input type="email" id="login-email" placeholder="nome@mapabase.com.br">
    </div>
    <div class="field" style="text-align:left;">
      <label class="field-label">Senha de Acesso</label>
      <input type="password" id="login-pass" placeholder="Digite a senha">
    </div>
    <button class="btn primary" id="btn-entrar" style="width:100%;justify-content:center;margin-top:6px;">Entrar na Plataforma</button>
  </div>
</div>

<div id="shell">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <img src="LOGO_VERT.png" alt="MapaBase" style="max-height: 44px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
      </div>
      <div class="brand-sub">Banco de Dados em Nuvem Ativo</div>
    </div>
    <nav class="mainnav" id="mainnav"></nav>
    <div class="sidebar-foot">
      <div id="status-sync">Armazenamento Local Ativo (IndexedDB)</div>
      <button class="btn ghost sm" id="btn-logout" style="margin-top:10px; width:100%; color: var(--ink-soft);">Sair do Sistema</button>
    </div>
  </aside>

  <div id="main">
    <div id="content"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="modal-root"></div>

<script>
/* ============================================================
   CONFIGURAÇÃO DO BANCO DE DADOS SUPABASE E INDEXEDDB
   ============================================================ */
const SUPABASE_URL = 'https://luvxmuhtemyloljnqgif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dnhtdWh0ZW15bG9sam5xZ2lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTE1MzcsImV4cCI6MjEwMDEyNzUzN30.inJ4fIL8ayPeg57snqeMRjFFwbSB1tZrCWQh0ytjXLA';
const _supabase = (window.supabase && SUPABASE_URL) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

const idb = {
  db: null,
  async init() {
    if(this.db) return;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('MapaBaseDB', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => { this.db = e.target.result; resolve(); };
      req.onerror = e => reject(e);
    });
  },
  async get(key) {
    await this.init();
    return new Promise((resolve) => {
      const tx = this.db.transaction('store', 'readonly');
      const req = tx.objectStore('store').get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  },
  async set(key, val) {
    await this.init();
    return new Promise((resolve) => {
      const tx = this.db.transaction('store', 'readwrite');
      tx.objectStore('store').put(val, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  },
  async remove(key) {
    await this.init();
    return new Promise((resolve) => {
      const tx = this.db.transaction('store', 'readwrite');
      tx.objectStore('store').delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  }
};

async function storageGet(key) { return await idb.get(key); }
async function storageSet(key, value) { return await idb.set(key, value); }
async function storageRemove(key) { return await idb.remove(key); }

/* ============================================================
   ESTADO E MOTOR DA APLICAÇÃO
   ============================================================ */
const state = {
  view: 'dashboard',
  empreendimentos: [],
  estruturas: [],
  vistoriasIndex: [],
  ready: false,
  novaVistoria: null,
  vistoriaAberta: null,
  dashFiltroEmp: '', 
  dashFiltroMes: '', 
  vistoriasConsolidadas: [], 
  tituloConsolidado: '',
  evolucaoFiltroEmp: '',
  evolucaoFiltroEst: ''
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function showToast(msg){
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t = setTimeout(()=> t.classList.remove('show'), 2200);
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){
  if(!iso) return '—'; const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function criticidadeLabel(c){ return {baixa:'Baixa',media:'Média',alta:'Alta',critica:'Crítica'}[c] || c; }
function estruturaById(id){ return state.estruturas.find(e=>e.id===id); }
function empreendimentoById(id){ return state.empreendimentos.find(e=>e.id===id); }
function setView(v){ state.view = v; render(); window.scrollTo(0,0); }
function fileToCompressedDataURL(file, maxDim=800, quality=0.55){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader(); reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = h*(maxDim/w); w = maxDim; } else if(h > maxDim){ w = w*(maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h); resolve(canvas.toDataURL('image/jpeg', quality));
      }; img.onerror = reject; img.src = reader.result;
    }; reader.readAsDataURL(file);
  });
}
function getGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
      () => resolve(null), { timeout: 6000 }
    );
  });
}

const NAV = [
  {id:'dashboard', label:'Painel', ic:'&#9679;'},
  {id:'nova', label:'Nova vistoria', ic:'&#10133;'},
  {id:'vistorias', label:'Vistorias', ic:'&#128203;'},
  {id:'naoconformidades', label:'Não conformidades', ic:'&#9888;'},
  {id:'evolucao', label:'Evolução', ic:'&#128200;'},
  {id:'empreendimentos', label:'Empreendimentos', ic:'&#127970;'},
  {id:'estruturas', label:'Biblioteca de estruturas', ic:'&#128218;'},
];

function renderNav(){
  const el = document.getElementById('mainnav');
  el.innerHTML = NAV.map(n => `<button class="navbtn ${state.view===n.id?'active':''}" data-nav="${n.id}"><span class="ic">${n.ic}</span><span>${n.label}</span></button>`).join('');
  el.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click', async ()=> {
      if(b.dataset.nav === 'nova') state.novaVistoria = null;
      if((b.dataset.nav === 'dashboard' || b.dataset.nav === 'vistorias' || b.dataset.nav === 'evolucao') && _supabase && navigator.onLine){
        showToast('Atualizando dados da Nuvem...'); await syncGlobalNuvem();
      }
      setView(b.dataset.nav);
    });
  });
}

function render(){
  renderNav();
  const c = document.getElementById('content');
  if(!state.ready){ c.innerHTML = '<div class="empty">Carregando…</div>'; return; }
  switch(state.view){
    case 'dashboard': c.innerHTML = viewDashboard(); bindDashboard(); break;
    case 'empreendimentos': c.innerHTML = viewEmpreendimentos(); bindEmpreendimentos(); break;
    case 'estruturas': c.innerHTML = viewEstruturas(); bindEstruturas(); break;
    case 'nova': c.innerHTML = viewNovaVistoria(); bindNovaVistoria(); break;
    case 'vistorias': c.innerHTML = viewVistorias(); bindVistorias(); break;
    case 'vistoria-detalhe': c.innerHTML = viewVistoriaDetalhe(); bindVistoriaDetalhe(); break;
    case 'relatorio-consolidado': c.innerHTML = viewRelatorioConsolidado(); bindRelatorioConsolidado(); break;
    case 'naoconformidades': c.innerHTML = viewNaoConformidades(); bindNaoConformidades(); break;
    case 'evolucao': c.innerHTML = viewEvolucao(); bindEvolucao(); break;
    default: c.innerHTML = '<div class="empty">Não encontrado</div>';
  }
}

/* ============================================================
   SINCRONIZAÇÃO NUVEM / OFFLINE
   ============================================================ */
async function syncGlobalNuvem(){
  if(!_supabase || !navigator.onLine) return false;
  try {
    const [empReq, estReq] = await Promise.all([ _supabase.from('empreendimentos').select('*'), _supabase.from('estruturas').select('*') ]);
    if(empReq.data && empReq.data.length > 0) {
      state.empreendimentos = empReq.data.map(d=>({id: d.id, nome: d.nome, tipo: d.tipo, estruturas: d.estruturas, criadoEm: d.criado_em}));
      await storageSet('empreendimentos', state.empreendimentos);
    }
    if(estReq.data && estReq.data.length > 0) {
      state.estruturas = estReq.data.map(d => {
        let itensArr = []; let setorVal = 'Geral';
        if (Array.isArray(d.itens)) { itensArr = d.itens; const def = DEFAULT_ESTRUTURAS.find(x => x.nome === d.nome); if (def) setorVal = def.setor; } 
        else if (d.itens && typeof d.itens === 'object') { itensArr = d.itens.list || []; setorVal = d.itens.setor || 'Geral'; }
        return { id: d.id, nome: d.nome, setor: setorVal, itens: itensArr };
      });
      await storageSet('estruturas', state.estruturas);
    }
    await loadVistoriasNuvem(); return true;
  } catch(e) { return false; }
}

async function loadVistoriasNuvem(){
  let localIndex = (await storageGet('vistorias:index')) || [];
  if(_supabase && navigator.onLine){
    try{
      const { data, error } = await _supabase.from('vistorias').select('id, empreendimento_nome, estrutura_nome, responsavel, data_hora, total_itens, total_nc, criticidade_max, itens');
      if(data && !error){
        const cloudMap = {};
        data.forEach(d => {
          cloudMap[d.id] = {
            id: d.id, empreendimentoNome: d.empreendimento_nome, estruturaNome: d.estrutura_nome,
            responsavel: d.responsavel, dataHora: d.data_hora, totalItens: d.total_itens, totalNC: d.total_nc,
            criticidadeMax: d.criticidade_max, criticidades: (d.itens||[]).filter(i=>i.status==='nc').map(i=>i.criticidade),
            syncStatus: 'synced'
          };
        });
        localIndex.forEach(lv => { if(lv.syncStatus === 'pending') cloudMap[lv.id] = lv; });
        state.vistoriasIndex = Object.values(cloudMap);
        await storageSet('vistorias:index', state.vistoriasIndex);
      }
    }catch(e){}
  } else { state.vistoriasIndex = localIndex; }
}

async function loadVistoria(id){ 
  let v = await storageGet('vistoria:'+id); if(v) return v;
  if(_supabase && navigator.onLine){
    try{
      const { data } = await _supabase.from('vistorias').select('*').eq('id', id).single();
      if(data) {
        v = { id: data.id, empreendimentoNome: data.empreendimento_nome, estruturaNome: data.estrutura_nome, responsavel: data.responsavel, dataHora: data.data_hora, gps: data.gps, itens: data.itens, syncStatus: 'synced' };
        await storageSet('vistoria:'+id, v); return v;
      }
    }catch(e){}
  }
  return null;
}

async function saveVistoria(v){
  const idx = state.vistoriasIndex.findIndex(x => x.id === v.id);
  let isOnline = navigator.onLine; let syncSuccess = false;
  if(isOnline && _supabase){
    try {
      const { error } = await _supabase.from('vistorias').upsert({
        id: v.id, empreendimento_nome: v.empreendimentoNome, estrutura_nome: v.estruturaNome, responsavel: v.responsavel, data_hora: v.dataHora, gps: v.gps, itens: v.itens, total_itens: v.itens.length, total_nc: v.itens.filter(i=>i.status==='nc').length, criticidade_max: v.itens.filter(i=>i.status==='nc').reduce((max,i)=> ({critica:4,alta:3,media:2,baixa:1}[i.criticidade]||0) > ({critica:4,alta:3,media:2,baixa:1}[max]||0) ? i.criticidade : max, null)
      });
      if(!error) syncSuccess = true;
    } catch(e) {}
  }
  v.syncStatus = syncSuccess ? 'synced' : 'pending';
  const indexData = { id: v.id, empreendimentoNome: v.empreendimentoNome, estruturaNome: v.estruturaNome, responsavel: v.responsavel, dataHora: v.dataHora, totalItens: v.itens.length, totalNC: v.itens.filter(i=>i.status==='nc').length, criticidadeMax: v.itens.filter(i=>i.status==='nc').reduce((max,i)=> ({critica:4,alta:3,media:2,baixa:1}[i.criticidade]||0) > ({critica:4,alta:3,media:2,baixa:1}[max]||0) ? i.criticidade : max, null), criticidades: v.itens.filter(i=>i.status==='nc').map(i=>i.criticidade), syncStatus: v.syncStatus };
  if(idx >= 0) state.vistoriasIndex[idx] = indexData; else state.vistoriasIndex.push(indexData);
  await storageSet('vistorias:index', state.vistoriasIndex); await storageSet('vistoria:'+v.id, v);
  if(!syncSuccess) showToast('Salvo Localmente (OFFLINE). Sincronize quando houver internet.'); else showToast('Vistoria salva com sucesso na Nuvem!');
}

window.sincronizarPendentes = async function() {
  if(!navigator.onLine) { showToast('Sem conexão com a internet!'); return; }
  const pendentes = state.vistoriasIndex.filter(v => v.syncStatus === 'pending');
  if(pendentes.length === 0) { showToast('Nenhuma vistoria pendente.'); return; }
  showToast(`Sincronizando ${pendentes.length} vistoria(s)...`); let successCount = 0;
  for(let p of pendentes) {
    const v = await loadVistoria(p.id);
    if(v) {
      const { error } = await _supabase.from('vistorias').upsert({
        id: v.id, empreendimento_nome: v.empreendimentoNome, estrutura_nome: v.estruturaNome, responsavel: v.responsavel, data_hora: v.dataHora, gps: v.gps, itens: v.itens, total_itens: v.itens.length, total_nc: v.itens.filter(i=>i.status==='nc').length, criticidade_max: v.itens.filter(i=>i.status==='nc').reduce((max,i)=> ({critica:4,alta:3,media:2,baixa:1}[i.criticidade]||0) > ({critica:4,alta:3,media:2,baixa:1}[max]||0) ? i.criticidade : max, null)
      });
      if(!error) { v.syncStatus = 'synced'; p.syncStatus = 'synced'; await storageSet('vistoria:'+v.id, v); successCount++; }
    }
  }
  await storageSet('vistorias:index', state.vistoriasIndex); render(); showToast(`${successCount} vistoria(s) sincronizada(s)!`);
};

async function deleteVistoria(id){
  if(!confirm('Tem certeza de que deseja excluir esta vistoria?')) return;
  state.vistoriasIndex = state.vistoriasIndex.filter(v => v.id !== id);
  await storageSet('vistorias:index', state.vistoriasIndex); await storageRemove('vistoria:'+id);
  if(_supabase && navigator.onLine){ await _supabase.from('vistorias').delete().eq('id', id); }
  state.vistoriaAberta = null; setView('vistorias'); showToast('Vistoria excluída.');
}

function editarVistoria(v){
  let emp = state.empreendimentos.find(e => e.nome === v.empreendimentoNome); let est = state.estruturas.find(e => e.nome === v.estruturaNome);
  const respostas = {};
  (v.itens || []).forEach(it => { respostas[it.itemId || it.id] = { status: it.status, observacao: it.observacao || '', criticidade: it.criticidade || 'media', recomendacao: it.recomendacao || '', fotos: it.fotos || [] }; });
  state.novaVistoria = { id: v.id, empreendimentoId: emp ? emp.id : null, estruturaId: est ? est.id : null, step: 3, respostas: respostas, gps: v.gps, responsavel: v.responsavel, dataHora: v.dataHora, itensOriginal: v.itens };
  setView('nova');
}

window.exportarExcel = async function(tipo = 'total', valor = '', empNome = '') {
  showToast('Gerando base Excel, aguarde...');
  let csvContent = "\uFEFF"; csvContent += "Empreendimento;Estrutura;Data e Hora;Responsável;Item de Inspeção;Categoria;Status;Observação Registrada;Criticidade;Recomendação Técnica\n";
  const escCsv = (texto) => { if (!texto) return '""'; return `"${texto.toString().replace(/"/g, '""').replace(/\n/g, " ")}"`; };
  let indexVists = state.vistoriasIndex;
  if (tipo === 'emp') { indexVists = state.vistoriasIndex.filter(v => v.empreendimentoNome === valor); } 
  else if (tipo === 'mes') { indexVists = state.vistoriasIndex.filter(v => { if (v.empreendimentoNome !== empNome) return false; const d = new Date(v.dataHora); if (isNaN(d)) return false; const mesAno = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }); return (mesAno.charAt(0).toUpperCase() + mesAno.slice(1)) === valor; }); } 
  else if (tipo === 'vist') { indexVists = state.vistoriasIndex.filter(v => v.id === valor); }
  if (indexVists.length === 0) { showToast('Nenhum dado encontrado para exportação.'); return; }
  for(const idx of indexVists) {
    const v = await loadVistoria(idx.id); if(!v) continue;
    const dataFmt = fmtDate(v.dataHora); const emp = escCsv(v.empreendimentoNome); const est = escCsv(v.estruturaNome); const resp = escCsv(v.responsavel);
    v.itens.forEach(it => {
      const itemTxt = escCsv(it.texto); const cat = escCsv(it.categoria); const statusLabel = it.status === 'conforme' ? 'Conforme' : (it.status === 'nc' ? 'Não Conforme' : 'N/A'); const status = escCsv(statusLabel); const obs = escCsv(it.observacao); const crit = escCsv(it.criticidade ? criticidadeLabel(it.criticidade) : ''); const rec = escCsv(it.recomendacao);
      csvContent += `${emp};${est};${escCsv(dataFmt)};${resp};${itemTxt};${cat};${status};${obs};${crit};${rec}\n`;
    });
  }
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.setAttribute("href", url);
  let filename = 'mapabase_inspecoes'; if(tipo === 'emp') filename += '_' + valor.replace(/\s+/g, '_'); if(tipo === 'mes') filename += '_' + valor.replace(/\s+/g, '_'); if(tipo === 'vist') filename += '_vistoria'; filename += '.csv';
  link.setAttribute("download", filename); document.body.appendChild(link); link.click(); document.body.removeChild(link); showToast('Download do Excel concluído!');
};

function estruturaModal(existing){

  }
  modal.innerHTML = `<div class="modal-backdrop" id="modal-bg"><div class="modal" style="max-width:680px;"><div class="modal-head"><h3>${isEdit?'Editar Estrutura':'Nova Estrutura'}</h3><button class="btn ghost sm" id="modal-close">✕</button></div><div class="modal-body"><div class="grid cols-2" style="margin-bottom:12px;"><div class="field" style="margin-bottom:0;"><label class="field-label">Nome da Estrutura</label><input type="text" id="est-nome" value="${esc(existing?.nome||'')}"></div><div class="field" style="margin-bottom:0;"><label class="field-label">Setor</label><select id="est-setor"><option value="Mineração" ${existing?.setor==='Mineração'?'selected':''}>⛏️ Mineração</option><option value="Agro" ${existing?.setor==='Agro'?'selected':''}>🌱 Agronegócio</option><option value="Geral" ${(existing?.setor||'Geral')==='Geral'?'selected':''}>⚙️ Comum / Geral</option></select></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:8px;"><label class="field-label" style="margin:0;font-size:13px;font-weight:700;">Itens (${itens.length})</label><div class="rowflex"><button type="button" class="btn ghost sm" id="btn-toggle-modo">${modoBulk ? '➔ Ver Lista Formatada' : '📋 Colar em Bloco'}</button></div></div><div id="est-body-container">${renderModalBody()}</div></div><div class="modal-foot">${isEdit ? `<button type="button" class="btn danger" id="est-del">Excluir</button><button type="button" class="btn ghost sm" id="est-dup">Duplicar</button>` : ''}<div class="spacer"></div><button type="button" class="btn ghost" id="modal-cancel">Cancelar</button><button type="button" class="btn primary" id="est-salvar">Salvar na Nuvem</button></div></div></div>`;
  const close = ()=> modal.innerHTML=''; document.getElementById('modal-close').onclick = close; document.getElementById('modal-cancel').onclick = close; document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });
  function syncInputsToMemory(){ if(!modoBulk){ document.querySelectorAll('[data-itemtxt]').forEach(inp=>{ const idx = +inp.dataset.itemtxt; if(itens[idx]) itens[idx].texto = inp.value; }); document.querySelectorAll('[data-itemcat]').forEach(inp=>{ const idx = +inp.dataset.itemcat; if(itens[idx]) itens[idx].categoria = inp.value; }); } else { const area = document.getElementById('est-bulk-txt'); if(area){ const lines = area.value.split('\n').map(l=>l.trim()).filter(Boolean); itens = lines.map(l => ({ id: uid(), texto: l, categoria: null })); } } }
  function updateContainer(){ document.getElementById('est-body-container').innerHTML = renderModalBody(); bindContainerEvents(); }
  function bindContainerEvents(){ if(!modoBulk){ document.querySelectorAll('[data-itemtxt]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemtxt].texto = inp.value; }); document.querySelectorAll('[data-itemcat]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemcat].categoria = inp.value; }); document.querySelectorAll('[data-itemdel]').forEach(b=> b.onclick = ()=>{ syncInputsToMemory(); itens.splice(+b.dataset.itemdel, 1); updateContainer(); }); document.querySelectorAll('[data-itemup]').forEach(b=> b.onclick = ()=>{ syncInputsToMemory(); const idx = +b.dataset.itemup; if(idx > 0){ const temp = itens[idx]; itens[idx] = itens[idx-1]; itens[idx-1] = temp; updateContainer(); } }); document.querySelectorAll('[data-itemdown]').forEach(b=> b.onclick = ()=>{ syncInputsToMemory(); const idx = +b.dataset.itemdown; if(idx < itens.length - 1){ const temp = itens[idx]; itens[idx] = itens[idx+1]; itens[idx+1] = temp; updateContainer(); } }); document.getElementById('est-add-item')?.addEventListener('click', ()=>{ syncInputsToMemory(); itens.push({ id: uid(), texto: '', categoria: '' }); updateContainer(); }); } }
  document.getElementById('btn-toggle-modo').onclick = ()=>{ syncInputsToMemory(); modoBulk = !modoBulk; document.getElementById('btn-toggle-modo').textContent = modoBulk ? '➔ Ver Lista Formatada' : '📋 Colar em Bloco'; updateContainer(); };
  bindContainerEvents();
  if(isEdit){ document.getElementById('est-del').onclick = async ()=>{ if(!confirm('Excluir estrutura?')) return; state.estruturas = state.estruturas.filter(e=>e.id!==existing.id); state.empreendimentos.forEach(e=> e.estruturas = e.estruturas.filter(id=>id!==existing.id)); await storageSet('estruturas', state.estruturas); await storageSet('empreendimentos', state.empreendimentos); if(_supabase && navigator.onLine) await _supabase.from('estruturas').delete().eq('id', existing.id); close(); render(); showToast('Estrutura excluída.'); }; document.getElementById('est-dup').onclick = async ()=>{ syncInputsToMemory(); const novoNome = (document.getElementById('est-nome').value.trim() || existing.nome) + ' (Cópia)'; const novoSetor = document.getElementById('est-setor').value; const copia = { id: uid(), nome: novoNome, setor: novoSetor, itens: JSON.parse(JSON.stringify(itens)) }; state.estruturas.push(copia); await storageSet('estruturas', state.estruturas); if(_supabase && navigator.onLine) { await _supabase.from('estruturas').upsert({ id: copia.id, nome: copia.nome, itens: {setor: copia.setor, list: copia.itens} }); } close(); render(); showToast('Cópia criada!'); }; }
  document.getElementById('est-salvar').onclick = async ()=>{ syncInputsToMemory(); const nome = document.getElementById('est-nome').value.trim(); if(!nome){ showToast('Informe o nome.'); return; } const setor = document.getElementById('est-setor').value; const itensLimpos = itens.filter(i=>i.texto.trim()).map(i=>({ id: i.id||uid(), texto: i.texto.trim(), categoria: i.categoria?.trim()||null })); let estObj; if(isEdit){ Object.assign(existing, { nome, setor, itens: itensLimpos }); estObj = existing; } else { estObj = { id: uid(), nome, setor, itens: itensLimpos }; state.estruturas.push(estObj); } await storageSet('estruturas', state.estruturas); if(_supabase && navigator.onLine) { await _supabase.from('estruturas').upsert({ id: estObj.id, nome: estObj.nome, itens: {setor: estObj.setor, list: estObj.itens} }); } close(); render(); showToast('Estrutura salva!'); };
}
function bindEstruturas(){ document.getElementById('btn-nova-estrutura')?.addEventListener('click', ()=>estruturaModal(null)); document.getElementById('btn-reset-estrutura')?.addEventListener('click', async ()=>{ if(!confirm('Restaurar biblioteca original da MapaBase?')) return; showToast('Restaurando...'); if(_supabase && navigator.onLine) { const { data } = await _supabase.from('estruturas').select('id'); if(data && data.length) { const ids = data.map(d=>d.id); await _supabase.from('estruturas').delete().in('id', ids); } } state.estruturas = DEFAULT_ESTRUTURAS; await storageSet('estruturas', state.estruturas); if(_supabase && navigator.onLine) { for(let e of state.estruturas){ await _supabase.from('estruturas').upsert({id: e.id, nome: e.nome, itens: {setor: e.setor, list: e.itens}}); } } render(); showToast('Restaurado!'); }); document.querySelectorAll('[data-editest]').forEach(b=>{ b.addEventListener('click', ()=> estruturaModal(estruturaById(b.dataset.editest))); }); }

function viewNovaVistoria(){
  const nv = state.novaVistoria;
  if(!nv || nv.step===1){
    return `

    `;
  }
  if(nv.step===2){
    const emp = empreendimentoById(nv.empreendimentoId); const opts = emp.estruturas.map(id=>estruturaById(id)).filter(Boolean);
    return `
    <div class="view-head"><div><div class="eyebrow">${esc(emp.nome)}</div><h1 class="view-title">Selecione a estrutura</h1></div><div class="rowflex"><button class="btn ghost" id="btn-voltar-1">← Voltar</button></div></div>
    <div class="steps"><div class="done"></div><div class="done"></div><div></div></div>
    ${opts.length ? `<div class="grid cols-3">${opts.map(e=>`<div class="card card-pad clickable" data-pickest="${e.id}"><div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${esc(e.nome)}</div><div class="hint" style="margin-top:4px;">${e.itens.length} itens</div></div>`).join('')}</div>` : `<div class="empty card"><div class="ic">&#128218;</div>Este empreendimento não tem estruturas vinculadas.</div>`}
    `;
  }
  
  const emp = empreendimentoById(nv.empreendimentoId) || { nome: nv.empreendimentoNome || 'Empreendimento' };
  const est = estruturaById(nv.estruturaId) || { nome: nv.estruturaNome || 'Estrutura', itens: [] };
  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []);
  if(!itensLista.length && nv.respostas){ itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null })); }
  const respondidos = itensLista.filter(it => nv.respostas[it.id]?.status).length;
  const pct = itensLista.length ? Math.round(100*respondidos/itensLista.length) : 0;
  let categorias = [...new Set(itensLista.map(i=>i.categoria).filter(Boolean))];
  let itensPorCat = categorias.length ? categorias.map(c=>({cat:c, itens: itensLista.filter(i=>i.categoria===c)})) : [{cat:null, itens: itensLista}];
  let dataHoraFormatted = nv.dataHora ? nv.dataHora.slice(0, 16) : '';

  return `
  <div class="view-head"><div><div class="eyebrow">${esc(emp.nome)} · ${esc(est.nome)}</div><h1 class="view-title">${nv.id ? 'Editar Vistoria' : 'Checklist de inspeção'}</h1></div>${!nv.id ? `<div class="rowflex"><button class="btn ghost" id="btn-voltar-2">← Voltar</button></div>` : ''}</div>
  <div class="steps"><div class="done"></div><div class="done"></div><div class="done"></div></div>

    <div class="grid cols-3">

      <div class="field" style="margin-bottom:0;"><label class="field-label">Responsável</label><input type="text" id="nv-responsavel" value="${esc(nv.responsavel||'')}" placeholder="Nome do inspetor"></div>
      <div class="field" style="margin-bottom:0;"><label class="field-label">GPS</label><div class="rowflex"><span class="hint" id="nv-gps-txt" style="margin:0;">${nv.gps? `${nv.gps.lat.toFixed(5)}, ${nv.gps.lng.toFixed(5)}` : 'Não capturada'}</span><button class="btn ghost sm" id="nv-gps-btn" type="button">${nv.gps?'Recapturar':'Capturar GPS'}</button></div></div>
    </div>
  </div>
  <div class="rowflex" style="margin-bottom:14px;"><div class="progressbar" style="flex:1;"><div style="width:${pct}%"></div></div><div class="hint">${respondidos}/${itensLista.length} respondidos</div></div>
  ${itensPorCat.map(grupo=>`${grupo.cat ? `<div class="eyebrow" style="margin:18px 0 8px;">${esc(grupo.cat)}</div>` : ''}${grupo.itens.map((it, i)=>renderChecklistItem(it, nv, itensLista.indexOf(it)+1)).join('')}`).join('')}
  <div class="sticky-footer"><div class="hint">${respondidos}/${itensLista.length} itens respondidos</div><button class="btn primary" id="nv-finalizar">${nv.id ? 'Atualizar Vistoria' : 'Finalizar Vistoria'}</button></div>
  `;
}

      <label class="field-label">Fotos (Câmera ou Galeria) ${isNC ? '(Recomendado)' : '(Opcional)'}</label><div class="photo-row" data-photos="${it.id}">${r.fotos.map((f,i)=>`<img class="photo-thumb" src="${f}" data-photoidx="${i}">`).join('')}<label class="photo-add">＋<input type="file" accept="image/*" multiple data-photoinput="${it.id}" style="display:none;"></label></div>

  const nv = state.novaVistoria;
  if(!nv || nv.step===1){ document.querySelectorAll('[data-pickemp]').forEach(el=>{ el.addEventListener('click', ()=>{ state.novaVistoria = { empreendimentoId: el.dataset.pickemp, estruturaId:null, step:2, respostas:{}, gps:null, responsavel:'', dataHora: '' }; render(); }); }); document.getElementById('btn-ir-emp')?.addEventListener('click', ()=> setView('empreendimentos')); return; }
  if(nv.step===2){ document.getElementById('btn-voltar-1')?.addEventListener('click', ()=>{ nv.step=1; render(); }); document.getElementById('btn-editar-emp-estruturas')?.addEventListener('click', ()=>{ empreendimentoModal(empreendimentoById(nv.empreendimentoId)); }); document.querySelectorAll('[data-pickest]').forEach(el=>{ el.addEventListener('click', async ()=>{ nv.estruturaId = el.dataset.pickest; nv.step = 3; render(); const gps = await getGPS(); if(gps){ nv.gps = gps; if(state.view==='nova') render(); } }); }); return; }
  document.getElementById('btn-voltar-2')?.addEventListener('click', ()=>{ nv.step=2; render(); }); document.getElementById('nv-responsavel')?.addEventListener('input', e=>{ nv.responsavel = e.target.value; }); document.getElementById('nv-datahora')?.addEventListener('change', e=>{ if(e.target.value) nv.dataHora = new Date(e.target.value).toISOString(); }); document.getElementById('nv-gps-btn')?.addEventListener('click', async ()=>{ document.getElementById('nv-gps-txt').textContent = 'Capturando...'; const gps = await getGPS(); nv.gps = gps; document.getElementById('nv-gps-txt').textContent = gps ? `${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)}` : 'Indisponível'; });
  document.querySelectorAll('[data-seg]').forEach(seg=>{ seg.querySelectorAll('button').forEach(btn=>{ btn.addEventListener('click', ()=>{ const id = seg.dataset.seg; state.novaVistoria.respostas[id].status = btn.dataset.status; render(); }); }); });
  document.querySelectorAll('[data-obs]').forEach(t=> t.addEventListener('input', e=>{ nv.respostas[t.dataset.obs].observacao = e.target.value; })); document.querySelectorAll('[data-crit]').forEach(s=> s.addEventListener('change', e=>{ nv.respostas[s.dataset.crit].criticidade = e.target.value; })); document.querySelectorAll('[data-rec]').forEach(i=> i.addEventListener('input', e=>{ nv.respostas[i.dataset.rec].recomendacao = e.target.value; }));
  document.querySelectorAll('[data-photoinput]').forEach(inp=>{ inp.addEventListener('change', async ()=>{ const id = inp.dataset.photoinput; const files = [...inp.files]; showToast('Processando foto(s)...'); for(const f of files){ try{ const dataUrl = await fileToCompressedDataURL(f); nv.respostas[id].fotos.push(dataUrl); }catch(e){ console.error(e); } } render(); }); });
  document.querySelectorAll('[data-photoidx]').forEach(img=>{ img.addEventListener('click', ()=>{ const wrap = img.closest('[data-photos]'); const id = wrap.dataset.photos; if(confirm('Remover esta foto?')){ nv.respostas[id].fotos.splice(+img.dataset.photoidx,1); render(); } }); });
  document.getElementById('nv-finalizar')?.addEventListener('click', finalizarVistoria);
}
async function finalizarVistoria(){
  const nv = state.novaVistoria; const emp = empreendimentoById(nv.empreendimentoId) || { id: nv.empreendimentoId, nome: nv.empreendimentoNome || 'Empreendimento' }; const est = estruturaById(nv.estruturaId) || { id: nv.estruturaId, nome: nv.estruturaNome || 'Estrutura', itens: [] }; const btn = document.getElementById('nv-finalizar');
  if (!nv.dataHora) { showToast('Por favor, informe a Data e Hora da Vistoria.'); return; }
  const respostasArray = Object.values(nv.respostas); const faltouObs = respostasArray.some(r => r.status === 'nc' && (!r.observacao || !r.observacao.trim())); if(faltouObs) { showToast('⚠️ Preencha a observação para todos os itens marcados como Não Conforme!'); return; }
  btn.disabled = true; btn.textContent = 'Salvando vistoria...';
  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []); if(!itensLista.length && nv.respostas){ itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null })); }
  const itensResp = itensLista.map(it=>{ const r = nv.respostas[it.id] || {status:null}; return { itemId: it.id, texto: it.texto, categoria: it.categoria, status: r.status || 'na', observacao: r.observacao || '', criticidade: r.status==='nc' ? (r.criticidade||'media') : null, recomendacao: r.status==='nc' ? (r.recomendacao||'') : '', fotos: r.fotos || [], }; });
  const vistoria = { id: nv.id || uid(), empreendimentoId: emp.id, empreendimentoNome: emp.nome, estruturaId: est.id, estruturaNome: est.nome, responsavel: nv.responsavel || '—', dataHora: nv.dataHora, gps: nv.gps, itens: itensResp, };
  await saveVistoria(vistoria); state.novaVistoria = null; state.vistoriaAberta = vistoria; setView('vistoria-detalhe'); window.scrollTo(0,0);
}

/* ============================================================
   VISTORIAS (HISTÓRICO)
   ============================================================ */
function viewVistorias(){
  const rows = [...state.vistoriasIndex].sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora));
  if(!rows.length){ return `<div class="view-head"><div><div class="eyebrow">Histórico</div><h1 class="view-title">Vistorias realizadas</h1></div></div><div class="empty card"><div class="ic">&#128203;</div>Nenhuma vistoria registrada ainda.</div>`; }
  const porEmpreendimento = {}; rows.forEach(v => { const emp = v.empreendimentoNome || 'Empreendimento não informado'; if(!porEmpreendimento[emp]) porEmpreendimento[emp] = []; porEmpreendimento[emp].push(v); });
  const temPendentes = rows.some(v => v.syncStatus === 'pending');
  return `
  <div class="view-head no-print">
    <div><div class="eyebrow">Histórico Organizado</div><h1 class="view-title">Vistorias por Empreendimento</h1></div>
    <div class="rowflex">${temPendentes ? `<button class="btn ghost danger" onclick="sincronizarPendentes()">⏳ Sincronizar Pendentes</button>` : ''}<button class="btn primary" onclick="exportarExcel()">📊 Exportar para Excel</button></div>
  </div>
  <div style="display:flex; flex-direction:column; gap:16px;">
    ${Object.entries(porEmpreendimento).map(([empNome, vists]) => {
      const porData = {}; vists.forEach(v => { const d = new Date(v.dataHora); const mesAno = isNaN(d) ? 'Data não informada' : d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }); const mesAnoCap = mesAno.charAt(0).toUpperCase() + mesAno.slice(1); if(!porData[mesAnoCap]) porData[mesAnoCap] = []; porData[mesAnoCap].push(v); });
      const totalNcEmp = vists.reduce((acc, curr) => acc + (curr.totalNC || 0), 0);
      return `<details class="card" style="overflow:hidden; break-inside: avoid;" open>
        <summary style="padding:16px 20px; background:var(--surface); cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; user-select:none; font-family:var(--font-display); font-size:20px; font-weight:600; border-bottom:1px solid var(--line);">
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;"><span style="font-size:22px;">📁</span><span style="color:var(--ink);">${esc(empNome)}</span><span class="badge na" style="font-size:11.5px;">${vists.length} vistoria(s)</span>${totalNcEmp > 0 ? `<span class="badge nc" style="font-size:11.5px;">${totalNcEmp} NC(s)</span>` : `<span class="badge conforme" style="font-size:11.5px;">100% OK</span>`}</div>
          <div class="no-print" style="display:flex; align-items:center; gap:14px; flex-wrap: wrap;"><button class="btn ghost sm" style="font-size:11.5px; border-color:var(--line);" onclick="event.preventDefault(); window.openRelatorioConsolidado('emp', '${esc(empNome)}', '')">🖨️ PDF Total</button><span style="font-size:12px; color:var(--ink-soft); font-weight:500;">▾</span></div>
        </summary>
        <div style="padding:16px 20px; background:var(--bg);">
          ${Object.entries(porData).map(([mesAno, listaVist]) => `
            <div style="margin-bottom:18px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap: wrap; gap: 8px;"><div style="font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; display:flex; align-items:center; gap:6px;"><span>🗓️</span> ${esc(mesAno)}</div><div style="display:flex; gap: 8px;"><button class="btn ghost sm no-print" onclick="window.exportarExcel('mes', '${esc(mesAno)}', '${esc(empNome)}')" style="font-size:11px; padding:4px 8px;">📊 Excel do Mês</button><button class="btn ghost sm no-print" onclick="window.openRelatorioConsolidado('mes', '${esc(mesAno)}', '${esc(empNome)}')" style="font-size:11px; padding:4px 8px;">🖨️ PDF do Mês</button></div></div>
              <div class="card table-wrapper"><table><thead><tr><th>Data / Hora</th><th>Estrutura</th><th>Responsável</th><th>Status Nuvem</th><th>NC</th><th>Criticidade</th></tr></thead><tbody>
                ${listaVist.map(v => `<tr class="clickable" data-open="${v.id}"><td><strong>${fmtDate(v.dataHora)}</strong></td><td>${esc(v.estruturaNome)}</td><td>${esc(v.responsavel||'—')}</td><td>${v.syncStatus==='pending'?'<span class="badge pending">⏳ Pendente</span>':'<span class="badge conforme">✅ Nuvem</span>'}</td><td>${v.totalNC > 0 ? `<span class="badge nc">${v.totalNC} NC</span>` : `<span class="badge conforme">OK</span>`}</td><td>${v.criticidadeMax ? `<span class="badge ${v.criticidadeMax}">${criticidadeLabel(v.criticidadeMax)}</span>` : '—'}</td></tr>`).join('')}
              </tbody></table></div></div>
          `).join('')}
        </div></details>`;
    }).join('')}
  </div>`;
}
function bindVistorias(){ document.querySelectorAll('[data-open]').forEach(tr=>{ tr.addEventListener('click', async ()=>{ const v = await loadVistoria(tr.dataset.open); state.vistoriaAberta = v; setView('vistoria-detalhe'); window.scrollTo(0,0); }); }); }

/* ============================================================
   DETALHE DA VISTORIA
   ============================================================ */
function viewVistoriaDetalhe(){
  const v = state.vistoriaAberta; if(!v) return '<div class="empty">Vistoria não encontrada.</div>';
  const nc = v.itens.filter(i=>i.status==='nc');
  const history = state.vistoriasIndex.filter(vi => vi.empreendimentoNome === v.empreendimentoNome && vi.estruturaNome === v.estruturaNome && vi.id !== v.id ).sort((a,b)=> new Date(b.dataHora) - new Date(a.dataHora));
  return `
  <div class="view-head no-print"><div><div class="eyebrow">Relatório</div><h1 class="view-title">${esc(v.estruturaNome)}</h1><div class="view-sub">${esc(v.empreendimentoNome)} · ${fmtDate(v.dataHora)}</div></div>
    <div class="rowflex"><button class="btn ghost danger" id="btn-excluir-vistoria">Excluir</button><button class="btn ghost" id="btn-editar-vistoria">Editar</button><button class="btn ghost" id="btn-voltar-lista">← Voltar</button><button class="btn primary" onclick="exportarExcel('vist', '${v.id}')">📊 Excel</button><button class="btn primary" id="btn-imprimir">🖨️ PDF</button></div></div>
  <div class="print-only-title" style="display:none; text-align:center; margin-bottom:20px;"><img src="LOGO_VERT.png" style="height:60px; margin-bottom:10px;"><h1 style="font-family:var(--font-display);font-size:24px;margin:0;">Relatório de Inspeção - ${esc(v.estruturaNome)}</h1></div>
  <div class="card card-pad" style="margin-bottom:18px;"><div class="grid cols-4"><div><div class="field-label">Empreendimento</div><div>${esc(v.empreendimentoNome)}</div></div><div><div class="field-label">Estrutura</div><div>${esc(v.estruturaNome)}</div></div><div><div class="field-label">Responsável</div><div>${esc(v.responsavel)}</div></div><div><div class="field-label">Data/hora</div><div>${fmtDate(v.dataHora)}</div></div></div><div style="margin-top:10px;font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);">GPS: ${v.gps ? `${v.gps.lat.toFixed(6)}, ${v.gps.lng.toFixed(6)} (±${Math.round(v.gps.acc||0)}m)` : 'não capturado'}</div></div>
  <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">Checklist</h3>
  <div class="card table-wrapper" style="margin-bottom:22px;"><table><thead><tr><th>Item</th><th>Status</th><th>Observação</th></tr></thead><tbody>${v.itens.map((it,idx)=>`<tr><td style="max-width:340px;"><span class="item-num">ITEM ${idx+1}${it.categoria?' · '+esc(it.categoria):''}</span><br>${esc(it.texto)}</td><td>${it.status==='conforme'?'<span class="badge conforme">Conforme</span>':it.status==='nc'?'<span class="badge nc">Não conforme</span>':'<span class="badge na">N/A</span>'}</td><td>${esc(it.observacao)||'—'}</td></tr>`).join('')}</tbody></table></div>
  <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">Não conformidades e plano de ação</h3>
  ${nc.length ? `<div class="card table-wrapper" style="margin-bottom:22px;"><table><thead><tr><th>Item</th><th>Criticidade</th><th>Recomendação técnica</th></tr></thead><tbody>${nc.map(it=>`<tr><td style="max-width:300px;">${esc(it.texto)}</td><td><span class="badge ${it.criticidade}">${criticidadeLabel(it.criticidade)}</span></td><td>${esc(it.recomendacao)||'<span class="hint">Não informada</span>'}</td></tr>`).join('')}</tbody></table></div>` : `<div class="card card-pad" style="margin-bottom:22px;color:var(--conforme);font-weight:600;">Nenhuma não conformidade identificada nesta vistoria.</div>`}
  <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">Relatório fotográfico</h3>
  ${v.itens.some(i=>i.fotos?.length) ? v.itens.filter(i=>i.fotos?.length).map(it=>`<div class="card card-pad" style="margin-bottom:14px; break-inside: avoid;"><div style="font-weight:600;margin-bottom:8px;">${esc(it.texto)}</div><div class="photo-row">${it.fotos.map(f=>`<img class="photo-thumb" style="width:120px;height:120px;" src="${f}">`).join('')}</div></div>`).join('') : `<div class="card card-pad hint">Nenhuma foto anexada.</div>`}
  ${history.length > 0 ? `<div style="page-break-before: auto; margin-top:40px;"><h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">📈 Evolução das Inspeções (Histórico da Estrutura)</h3><div class="card table-wrapper" style="margin-bottom:22px;"><table><thead><tr><th>Data / Hora</th><th>Responsável</th><th>Status Nuvem</th><th>NCs</th><th>Criticidade Máx.</th><th class="no-print">Ação</th></tr></thead><tbody>${history.map(h => `<tr><td>${fmtDate(h.dataHora)}</td><td>${esc(h.responsavel || '—')}</td><td>${h.syncStatus==='pending'?'⏳ Pendente':'✅ Nuvem'}</td><td>${h.totalNC > 0 ? `<span class="badge nc">${h.totalNC} NC</span>` : `<span class="badge conforme">OK</span>`}</td><td>${h.criticidadeMax ? `<span class="badge ${h.criticidadeMax}">${criticidadeLabel(h.criticidadeMax)}</span>` : '—'}</td><td class="no-print"><button class="btn ghost sm" data-openvist="${h.id}">Ver Relatório</button></td></tr>`).join('')}</tbody></table></div></div>` : ''}
  `;
}
function bindVistoriaDetalhe(){
  const v = state.vistoriaAberta; document.getElementById('btn-excluir-vistoria')?.addEventListener('click', ()=> deleteVistoria(v.id)); document.getElementById('btn-editar-vistoria')?.addEventListener('click', ()=> editarVistoria(v)); document.getElementById('btn-voltar-lista')?.addEventListener('click', ()=> setView('vistorias')); document.getElementById('btn-imprimir')?.addEventListener('click', ()=> window.print());
  document.querySelectorAll('[data-openvist]').forEach(btn=>{ btn.addEventListener('click', async ()=>{ const pastV = await loadVistoria(btn.dataset.openvist); if(pastV) { state.vistoriaAberta = pastV; setView('vistoria-detalhe'); window.scrollTo(0,0); } }); });
}

/* ============================================================
   NÃO CONFORMIDADES
   ============================================================ */
function viewNaoConformidades(){
  return `<div class="view-head no-print"><div><div class="eyebrow">Consolidado</div><h1 class="view-title">Não conformidades</h1><div class="view-sub">Itens não conformes organizados por pastas de empreendimento e vistoria.</div></div><div class="rowflex"><button class="btn primary" onclick="window.print()">🖨️ Exportar PDF de NCs</button></div></div><div class="print-only-title" style="display:none; text-align:center; margin-bottom:30px;"><img src="LOGO_VERT.png" style="height:60px; margin-bottom:10px;"><h1 style="font-family:var(--font-display);font-size:26px;margin:0;">Relatório de Não Conformidades Consolidado</h1></div><div id="nc-list"><div class="empty">Carregando NCs da nuvem, aguarde...</div></div>`;
}
async function bindNaoConformidades(){
  const withNC = state.vistoriasIndex.filter(v=>v.totalNC>0).sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora)); const ncList = [];
  for(const idx of withNC){ const v = await loadVistoria(idx.id); if(!v) continue; v.itens.filter(i=>i.status==='nc').forEach(it=>{ ncList.push({ vistoriaId: v.id, empreendimento: v.empreendimentoNome, estrutura: v.estruturaNome, dataHora: v.dataHora, responsavel: v.responsavel, ...it }); }); }
  const el = document.getElementById('nc-list'); if(!el) return; if(!ncList.length){ el.innerHTML = '<div class="empty card"><div class="ic">&#10004;</div>Nenhuma não conformidade registrada no banco de dados.</div>'; return; }
  const porEmp = {}; ncList.forEach(nc => { if(!porEmp[nc.empreendimento]) porEmp[nc.empreendimento] = {}; const vistKey = nc.vistoriaId; if(!porEmp[nc.empreendimento][vistKey]) porEmp[nc.empreendimento][vistKey] = { id: nc.vistoriaId, dataHora: nc.dataHora, estrutura: nc.estrutura, responsavel: nc.responsavel, itens: [] }; porEmp[nc.empreendimento][vistKey].itens.push(nc); });
  let html = '<div style="display:flex; flex-direction:column; gap:16px;">';
  for(const [empNome, vistoriasDict] of Object.entries(porEmp)){
    html += `<details class="card" open style="overflow:hidden; break-inside: avoid;"><summary style="padding:16px 20px; background:var(--surface); cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; user-select:none; font-family:var(--font-display); font-size:20px; font-weight:600; border-bottom:1px solid var(--line);"><div style="display:flex; align-items:center; gap:10px;"><span style="font-size:22px;">🏢</span> <span style="color:var(--ink);">${esc(empNome)}</span></div><div class="no-print" style="font-size:12px; color:var(--ink-soft); font-weight:500;">Clique para abrir/fechar ▾</div></summary><div style="padding:16px 20px; background:var(--bg);">`;
    const vistoriasArray = Object.values(vistoriasDict).sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora));
    for(const vData of vistoriasArray){
      vData.itens.sort((a,b)=> ({critica:4,alta:3,media:2,baixa:1}[b.criticidade]||0) - ({critica:4,alta:3,media:2,baixa:1}[a.criticidade]||0));
      html += `<div style="margin-bottom:24px; break-inside: avoid;"><div style="font-size:13.5px; font-weight:700; color:var(--accent); text-transform:uppercase; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;"><span>🛠️ ${esc(vData.estrutura)}</span><span style="color:var(--ink-soft); font-weight:600;">🗓️ Data: ${fmtDate(vData.dataHora)}</span></div><div class="card table-wrapper" style="box-shadow:none;"><table><thead><tr><th style="width:80px;">Criticidade</th><th>Item apontado (Não Conforme)</th><th>Observação Registrada</th><th>Recomendação Técnica</th><th class="no-print" style="width:60px;">Ação</th></tr></thead><tbody>${vData.itens.map(r=>`<tr style="break-inside: avoid;"><td><span class="badge ${r.criticidade}">${criticidadeLabel(r.criticidade)}</span></td><td style="max-width:280px; font-weight:500;">${esc(r.texto)}</td><td style="max-width:220px; font-size:12.5px; color:var(--ink-soft);">${esc(r.observacao)||'—'}</td><td style="max-width:220px; font-size:12.5px; color:var(--ink-soft);">${esc(r.recomendacao)||'—'}</td><td class="no-print"><button class="btn ghost sm" data-openvist="${r.vistoriaId}">Ver Relatório</button></td></tr>`).join('')}</tbody></table></div></div>`;
    }
    html += `</div></details>`;
  }
  html += '</div>'; el.innerHTML = html;
  el.querySelectorAll('[data-openvist]').forEach(btn=>{ btn.addEventListener('click', async ()=>{ const v = await loadVistoria(btn.dataset.openvist); state.vistoriaAberta = v; setView('vistoria-detalhe'); window.scrollTo(0,0); }); });
}

checkAuth();
</script>
