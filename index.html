<style>
:root{
  --bg:#F1F3EE;
  --surface:#FFFFFF;
  --surface-2:#E9ECE5;
  --ink:#16241C;
  --ink-soft:#546056;
  --ink-faint:#8A9389;
  --line:#D7DED2;
  --accent:#7ebf41;
  --accent-ink:#f0f8e9;
  --conforme:#2F9E44;
  --conforme-bg:#E9F7EC;
  --nc:#C4332C;
  --nc-bg:#FBEAE8;
  --na:#8A9389;
  --na-bg:#EEF0EA;
  --baixa:#5B9A78;
  --media:#D69E2E;
  --alta:#E2571D;
  --critica:#9B1C2E;
  --radius:10px;
  --shadow:0 1px 2px rgba(22,36,28,.06), 0 2px 12px rgba(22,36,28,.05);
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--accent);color:#fff;}
summary::-webkit-details-marker { display:none; }
summary { list-style: none; }

/* TELA DE LOGIN */
#login-screen{
  position:fixed;inset:0;background:var(--ink);z-index:9999;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:var(--surface);border-radius:12px;padding:36px 32px;
  width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);
  text-align:center;
}

/* SHELL LAYOUT */
#shell{display:flex;min-height:100vh;}
#sidebar{
  width:220px;flex-shrink:0;background:var(--ink);color:#EDF1EA;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;}
.brand-mark img {max-width:100%;height:auto;max-height:40px;object-fit:contain;}
.brand-sub{font-size:11px;color:#9FB0A2;margin-top:8px;letter-spacing:.06em;text-transform:uppercase;}
nav.mainnav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.navbtn{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;
  background:transparent;color:#C7D2C7;border-radius:8px;font-size:14.5px;
  font-weight:500;text-align:left;transition:background .12s, color .12s;
}
.navbtn:hover{background:rgba(255,255,255,.06);color:#fff;}
.navbtn.active{background:var(--accent);color:var(--ink);font-weight:600;}
.navbtn .ic{width:18px;text-align:center;flex-shrink:0;opacity:.9;}
.sidebar-foot{padding:14px 20px 18px;font-size:11px;color:#7C8C7E;border-top:1px solid rgba(255,255,255,.08);}
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#content{flex:1;padding:28px 34px 90px;max-width:1180px;width:100%;}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.view-title{font-family:var(--font-display);font-size:32px;font-weight:600;line-height:1;margin:0;}
.view-sub{color:var(--ink-soft);font-size:14px;margin-top:6px;}
.eyebrow{text-transform:uppercase;letter-spacing:.09em;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;}

/* PRIMITIVES */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:14px;font-weight:600;white-space:nowrap;justify-content:center;}
.btn:hover{border-color:var(--ink-faint);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--ink);}
.btn.primary:hover{background:#6da838;}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.danger{color:var(--nc);border-color:var(--nc-bg);}
.btn.sm{padding:6px 11px;font-size:12.5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:20px;}
.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.kpi{padding:18px 20px;}
.kpi .num{font-family:var(--font-display);font-size:38px;font-weight:600;line-height:1;}
.kpi .lbl{font-size:12.5px;color:var(--ink-soft);margin-top:6px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.01em;}
.badge.conforme{background:var(--conforme-bg);color:var(--conforme);}
.badge.nc{background:var(--nc-bg);color:var(--nc);}
.badge.na{background:var(--na-bg);color:var(--na);}
.badge.baixa{background:#E7F3EC;color:var(--baixa);}
.badge.media{background:#FBF1DC;color:#9A7415;}
.badge.alta{background:#FCE7DD;color:var(--alta);}
.badge.critica{background:#F7DEE1;color:var(--critica);}
.badge.pending{background:#FFF3CD;color:#975A16; border:1px solid #F6E05E;}

table { width:100%; border-collapse:collapse; font-size:13.5px; min-width:600px; }
th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); padding:8px 10px; border-bottom:1px solid var(--line); }
td { padding:10px; border-bottom:1px solid var(--line); vertical-align:top; }

tr.clickable:hover { background:var(--surface-2); cursor:pointer; }
.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty .ic{font-size:34px;margin-bottom:10px;}

textarea{resize:vertical;min-height:64px;}
label.field-label{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;display:block;}
.field{margin-bottom:14px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}

/* MODAIS */
.modal-backdrop{

.photo-thumb{width:64px;height:64px;border-radius:7px;object-fit:cover;border:1px solid var(--line);position:relative;}

.rowflex{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

const SUPABASE_URL = 'https://luvxmuhtemyloljnqgif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dnhtdWh0ZW15bG9sam5xZ2lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTE1MzcsImV4cCI6MjEwMDEyNzUzN30.inJ4fIL8ayPeg57snqeMRjFFwbSB1tZrCWQh0ytjXLA';

const _supabase = (window.supabase && SUPABASE_URL) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

const idb = {
  db: null,
  async init() {
    if(this.db) return;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('MapaBaseDB', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('store');
      req.onsuccess = e => { this.db = e.target.result; resolve(); };
      req.onerror = e => reject(e);
    });
  },
  async get(key) {
    await this.init();
    return new Promise((resolve) => {
      const req = this.db.transaction('store', 'readonly').objectStore('store').get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(null);
    });
  },
  async set(key, val) {
    await this.init();
    return new Promise((resolve) => {
      const tx = this.db.transaction('store', 'readwrite');
      tx.objectStore('store').put(val, key);
      tx.oncomplete = () => resolve(true);
    });
  },
  async remove(key) {
    await this.init();
    return new Promise((resolve) => {
      const tx = this.db.transaction('store', 'readwrite');
      tx.objectStore('store').delete(key);
      tx.oncomplete = () => resolve(true);
    });
  }
};

async function storageGet(key) { return await idb.get(key); }
async function storageSet(key, value) { return await idb.set(key, value); }
async function storageRemove(key) { return await idb.remove(key); }

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function criticidadeLabel(val) {
  const map = { baixa: 'Baixa', media: 'Média', alta: 'Alta', critica: 'Crítica' };
  return map[val] || val;
}

function showToast(msg) {
  const t = document.getElementById('toast');

/* FOTOS: Compressão em Canvas para Base64 */
function fileToCompressedDataURL(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const state = {
  view: 'dashboard',
  empreendimentos: [],
  estruturas: [],
  vistoriasIndex: [],
  ready: false,
  novaVistoria: null,
  vistoriaAberta: null,
  dashFiltroEmp: '', 
  dashFiltroMes: '', 
  evolucaoFiltroEmp: '',
  evolucaoFiltroEst: '',
  estruturaEditando: null
};

function setView(viewName) {
  state.view = viewName;
  closeModal();
  render();
  window.scrollTo(0,0);
}

function render() {
  if (!state.ready) return;

  const nav = document.getElementById('mainnav');
  const menu = [
    { id: 'dashboard', icon: '📊', label: 'Painel Geral' },
    { id: 'vistorias', icon: '📋', label: 'Histórico' },
    { id: 'ncs', icon: '⚠️', label: 'Não Conformidades' },
    { id: 'evolucao', icon: '📈', label: 'Evolução' },
    { id: 'empreendimentos', icon: '🏢', label: 'Empreendimentos' },
    { id: 'estruturas', icon: '🏗️', label: 'Estruturas' }
  ];
  nav.innerHTML = menu.map(m => `
    <button class="navbtn ${state.view === m.id ? 'active' : ''}" onclick="setView('${m.id}')">
      <span class="ic">${m.icon}</span> ${m.label}
    </button>
  `).join('');

  document.getElementById('status-sync').textContent = navigator.onLine ? '🟢 Online (Nuvem)' : '🔴 Offline (Local)';

  const views = {
    'dashboard': { html: viewDashboard, bind: bindDashboard },
    'vistorias': { html: viewVistorias, bind: bindVistorias },
    'vistoria-detalhe': { html: () => viewVistoriaDetalhe(), bind: bindVistoriaDetalhe },
    'ncs': { html: viewNcs, bind: bindNcs },
    'evolucao': { html: viewEvolucao, bind: bindEvolucao },
    'empreendimentos': { html: viewEmpreendimentos, bind: bindEmpreendimentos },
    'estruturas': { html: viewEstruturas, bind: bindEstruturas },
    'nova': { html: viewNovaVistoria, bind: bindNovaVistoria }
  };

  const content = document.getElementById('content');
  if (views[state.view]) {
    content.innerHTML = views[state.view].html();
    if(views[state.view].bind) views[state.view].bind();
  }
}

async function syncGlobalNuvem(){
  if(!_supabase || !navigator.onLine) return false;
  try {
    const [empReq, estReq] = await Promise.all([
      _supabase.from('empreendimentos').select('*'),
      _supabase.from('estruturas').select('*')
    ]);
    
    if(empReq.data && empReq.data.length > 0) {
      state.empreendimentos = empReq.data.map(d=>({id: d.id, nome: d.nome, tipo: d.tipo, estruturas: d.estruturas, criadoEm: d.criado_em}));
      await storageSet('empreendimentos', state.empreendimentos);
    }
    if(estReq.data && estReq.data.length > 0) {
      state.estruturas = estReq.data.map(d => ({ id: d.id, nome: d.nome, setor: d.itens?.setor || 'Geral', itens: d.itens?.list || d.itens || [] }));
      await storageSet('estruturas', state.estruturas);
    }
    await loadVistoriasNuvem();
    return true;
  } catch(e) { return false; }
}

async function loadVistoriasNuvem(){
  let localIndex = (await storageGet('vistorias:index')) || [];
  if(_supabase && navigator.onLine){
    try{
      const { data } = await _supabase.from('vistorias').select('id, empreendimento_nome, estrutura_nome, responsavel, data_hora, total_itens, total_nc, criticidade_max, criticidades_map');
      if(data){
        const cloudMap = {};
        data.forEach(d => {
          cloudMap[d.id] = {
            id: d.id, empreendimentoNome: d.empreendimento_nome, estruturaNome: d.estrutura_nome,
            responsavel: d.responsavel, dataHora: d.data_hora, totalItens: d.total_itens,
            totalNC: d.total_nc, criticidadeMax: d.criticidade_max, syncStatus: 'synced',
            criticidades: d.criticidades_map || {} 
          };
        });
        localIndex.forEach(lv => { if(lv.syncStatus === 'pending') cloudMap[lv.id] = lv; });
        state.vistoriasIndex = Object.values(cloudMap);
        await storageSet('vistorias:index', state.vistoriasIndex);
      }
    }catch(e){}
  } else {
    state.vistoriasIndex = localIndex;
  }
}

async function loadVistoria(id){ 
  let v = await storageGet('vistoria:'+id); 
  if(v) return v;
  if(_supabase && navigator.onLine){
    try{
      const { data } = await _supabase.from('vistorias').select('*').eq('id', id).single();
      if(data) {
        v = {
          id: data.id, empreendimentoNome: data.empreendimento_nome, estruturaNome: data.estrutura_nome,
          responsavel: data.responsavel, dataHora: data.data_hora, gps: data.gps, itens: data.itens, syncStatus: 'synced'
        };
        await storageSet('vistoria:'+id, v);
        return v;
      }
    }catch(e){}
  }
  return null;
}

window.sincronizarPendentes = async function() {
  if(!navigator.onLine) { showToast('Sem conexão!'); return; }
  const pendentes = state.vistoriasIndex.filter(v => v.syncStatus === 'pending');
  if(pendentes.length === 0) { showToast('Nenhuma vistoria pendente.'); return; }
  showToast(`Sincronizando ${pendentes.length}...`);
  let successCount = 0;

  for(let p of pendentes) {
    const v = await loadVistoria(p.id);
    if(v) {
      
      let critMax = null;
      const criticidadesCount = { baixa: 0, media: 0, alta: 0, critica: 0 };
      v.itens.forEach(i => {
        if (i.status === 'nc' && i.criticidade) {
          criticidadesCount[i.criticidade]++;
          const val = {critica:4,alta:3,media:2,baixa:1}[i.criticidade];
          const maxVal = {critica:4,alta:3,media:2,baixa:1}[critMax]||0;
          if(val > maxVal) critMax = i.criticidade;
        }
      });

      const { error } = await _supabase.from('vistorias').upsert({
        id: v.id, empreendimento_nome: v.empreendimentoNome, estrutura_nome: v.estruturaNome,
        responsavel: v.responsavel, data_hora: v.dataHora, gps: v.gps, itens: v.itens,
        total_itens: v.itens.length, total_nc: v.itens.filter(i=>i.status==='nc').length,
        criticidade_max: critMax,
        criticidades_map: criticidadesCount
      });
      if(!error) {
        v.syncStatus = 'synced'; p.syncStatus = 'synced';
        await storageSet('vistoria:'+v.id, v);
        successCount++;
      }
    }
  }
  await storageSet('vistorias:index', state.vistoriasIndex);
  render();
  showToast(`${successCount} sincronizadas!`);
};

async function saveVistoria(v) {
  let isOnline = navigator.onLine;
  let syncSuccess = false;
  let critMax = null;

  const criticidadesCount = { baixa: 0, media: 0, alta: 0, critica: 0 };
  v.itens.forEach(i => {
    if (i.status === 'nc' && i.criticidade) {
      criticidadesCount[i.criticidade]++;
      const val = {critica:4,alta:3,media:2,baixa:1}[i.criticidade];
      const maxVal = {critica:4,alta:3,media:2,baixa:1}[critMax]||0;
      if(val > maxVal) critMax = i.criticidade;
    }
  });

  if (isOnline && _supabase) {
    try {
      const { error } = await _supabase.from('vistorias').upsert({
        id: v.id,
        empreendimento_nome: v.empreendimentoNome,
        estrutura_nome: v.estruturaNome,
        responsavel: v.responsavel,
        data_hora: v.dataHora,
        gps: v.gps,
        itens: v.itens,
        total_itens: v.itens.length,
        total_nc: v.itens.filter(i=>i.status==='nc').length,
        criticidade_max: critMax,
        criticidades_map: criticidadesCount
      });
      if (!error) syncSuccess = true;
    } catch(e) {}
  }

  v.syncStatus = syncSuccess ? 'synced' : 'pending';
  
  const idxData = {
    id: v.id, empreendimentoNome: v.empreendimentoNome, estruturaNome: v.estruturaNome,
    responsavel: v.responsavel, dataHora: v.dataHora,
    totalNC: v.itens.filter(i=>i.status==='nc').length,
    totalItens: v.itens.length,
    criticidades: criticidadesCount,
    criticidadeMax: critMax,
    syncStatus: v.syncStatus
  };

  const idx = state.vistoriasIndex.findIndex(x => x.id === v.id);
  if (idx >= 0) state.vistoriasIndex[idx] = idxData;
  else state.vistoriasIndex.push(idxData);

  await storageSet('vistorias:index', state.vistoriasIndex);
  await storageSet('vistoria:'+v.id, v);

  showToast(syncSuccess ? 'Salvo na Nuvem com sucesso!' : 'Salvo OFFLINE. Sincronize depois.');
}

window.duplicarEstrutura = async function(id) {
  const est = state.estruturas.find(e => e.id === id);
  if(est) {
    const clone = JSON.parse(JSON.stringify(est));
    clone.id = uid();
    clone.nome = clone.nome + ' (Cópia)';
    clone.itens = clone.itens.map(i => ({...i, id: uid()}));
    state.estruturas.push(clone);
    await storageSet('estruturas', state.estruturas);
    if(_supabase && navigator.onLine) await _supabase.from('estruturas').upsert({id: clone.id, nome: clone.nome, itens: {setor: clone.setor, list: clone.itens}});
    render(); showToast('Estrutura duplicada!');
  }
}

      if(nv.itens.length === 0) {
        const estruturaRef = state.estruturas.find(e => e.nome === nv.est);
        nv.itens = estruturaRef ? JSON.parse(JSON.stringify(estruturaRef.itens)) : [];
      }
      nv.step = 2;
      render();
    });
  }

  if (nv && nv.step === 2) {
    document.getElementById('btn-nv-back')?.addEventListener('click', () => { nv.step = 1; render(); });
    
    document.querySelectorAll('.seg button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = e.target.dataset.id;
        const st = e.target.dataset.status;
        if(!nv.respostas[id]) nv.respostas[id] = { observacao: '', criticidade: 'media', recomendacao: '', fotos: [] };
        nv.respostas[id].status = st;
        render(); 
        setTimeout(()=> e.target.scrollIntoView({behavior: "smooth", block: "center"}), 50);
      });
    });

    document.querySelectorAll('.nv-obs').forEach(inp => inp.addEventListener('change', e => nv.respostas[e.target.dataset.id].observacao = e.target.value));
    document.querySelectorAll('.nv-crit').forEach(inp => inp.addEventListener('change', e => nv.respostas[e.target.dataset.id].criticidade = e.target.value));
    document.querySelectorAll('.nv-recom').forEach(inp => inp.addEventListener('change', e => nv.respostas[e.target.dataset.id].recomendacao = e.target.value));

    document.getElementById('btn-nv-save')?.addEventListener('click', async () => {
      const faltam = nv.itens.filter(it => !nv.respostas[it.id]?.status);
      if(faltam.length > 0) return showToast('Responda todos os itens do checklist antes de salvar!');
      
      const ncsSemObs = nv.itens.filter(it => nv.respostas[it.id]?.status === 'nc' && !nv.respostas[it.id]?.observacao.trim());
      if(ncsSemObs.length > 0) return showToast('Toda Não Conformidade exige uma Observação justificando o problema.');

      const finalItens = nv.itens.map(it => ({
        ...it,
        status: nv.respostas[it.id].status,
        observacao: nv.respostas[it.id].observacao,
        criticidade: nv.respostas[it.id].status === 'nc' ? nv.respostas[it.id].criticidade : null,
        recomendacao: nv.respostas[it.id].status === 'nc' ? nv.respostas[it.id].recomendacao : null,
        fotos: nv.respostas[it.id].fotos
      }));

      const isEdit = !!nv.id;

      const vistoriaObj = {
        id: isEdit ? nv.id : uid(),
        empreendimentoNome: nv.emp,
        estruturaNome: nv.est,
        responsavel: nv.resp,
        dataHora: isEdit ? nv.dataHora : new Date().toISOString(),
        gps: nv.gps,
        itens: finalItens
      };

      await saveVistoria(vistoriaObj);
      state.novaVistoria = null;
      setView('vistorias');
    });
  }
}

/* EXPORTAÇÃO EXCEL REAL */
window.exportarExcel = async function(tipo = 'total', valor = '', empNome = '') {
  showToast('Gerando base Excel, aguarde...');
  
  let csvContent = "\uFEFF"; 
  csvContent += "Empreendimento;Estrutura;Data e Hora;Responsável;Item de Inspeção;Categoria;Status;Observação Registrada;Criticidade;Recomendação Técnica\n";

  const escCsv = (texto) => {
    if (!texto) return '""';
    const str = texto.toString().replace(/"/g, '""').replace(/\n/g, " ");
    return `"${str}"`;
  };

  let indexVists = state.vistoriasIndex;
  if (tipo === 'emp') {
     indexVists = state.vistoriasIndex.filter(v => v.empreendimentoNome === valor);
  } else if (tipo === 'mes') {
     indexVists = state.vistoriasIndex.filter(v => {
       if (v.empreendimentoNome !== empNome) return false;
       const d = new Date(v.dataHora);
       if (isNaN(d)) return false;
       return d.toISOString().slice(0, 7) === valor; 
     });
  }

  if (indexVists.length === 0) return showToast('Nenhum dado encontrado.');

  for(const idx of indexVists) {
    const v = await loadVistoria(idx.id);
    if(!v) continue;
    
    const dataFmt = fmtDate(v.dataHora);
    const emp = escCsv(v.empreendimentoNome);
    const est = escCsv(v.estruturaNome);
    const resp = escCsv(v.responsavel);

    v.itens.forEach(it => {
      const itemTxt = escCsv(it.texto);
      const cat = escCsv(it.categoria);
      const statusLabel = it.status === 'conforme' ? 'Conforme' : (it.status === 'nc' ? 'Não Conforme' : 'N/A');
      const status = escCsv(statusLabel);
      const obs = escCsv(it.observacao);
      const crit = escCsv(it.criticidade ? criticidadeLabel(it.criticidade) : '');
      const rec = escCsv(it.recomendacao);

      csvContent += `${emp};${est};${escCsv(dataFmt)};${resp};${itemTxt};${cat};${status};${obs};${crit};${rec}\n`;
    });
  }

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  let filename = `mapabase_inspecoes_${new Date().getTime()}.csv`;
  link.setAttribute("download", filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('Download concluído!');
};

    state.vistoriasIndex = state.vistoriasIndex.filter(v => v.id !== id);

    await storageRemove('vistoria:'+id);
    if(_supabase && navigator.onLine) await _supabase.from('vistorias').delete().eq('id', id);
    state.vistoriaAberta = null;
    setView('vistorias');
    showToast('Vistoria excluída.');
  }
}

window.editarVistoriaAtual = function() {
  const v = state.vistoriaAberta;
  const respostas = {};
  v.itens.forEach(it => {
    respostas[it.id] = { status: it.status, observacao: it.observacao||'', criticidade: it.criticidade||'media', recomendacao: it.recomendacao||'', fotos: it.fotos||[] };
  });
  state.novaVistoria = {
    id: v.id, step: 2, emp: v.empreendimentoNome, est: v.estruturaNome,
    resp: v.responsavel, gps: v.gps, dataHora: v.dataHora,
    itens: v.itens, respostas: respostas
  };
  setView('nova');
}

        </select>
      </div>
    </div>
  </div>`;

  if(!state.evolucaoFiltroEmp || !state.evolucaoFiltroEst) {
    return html + `<div class="empty card">Utilize os filtros acima.</div>`;
  }

  const history = state.vistoriasIndex.filter(vi => vi.empreendimentoNome === state.evolucaoFiltroEmp && vi.estruturaNome === state.evolucaoFiltroEst)
    .sort((a,b)=> new Date(a.dataHora) - new Date(b.dataHora));

}

  document.getElementById('evo-est')?.addEventListener('change', e => { state.evolucaoFiltroEst = e.target.value; render(); });

    window.evoChartInstance = new Chart(ctx, {
      type: 'line',

window.carregarNcsNaTela = async function() {
  const container = document.getElementById('ncs-container');
  container.innerHTML = '<div class="empty">Processando dados, aguarde...</div>';
  
  let allNcs = [];
  for(let idx of state.vistoriasIndex) {
    if(idx.totalNC > 0) {
      const v = await loadVistoria(idx.id);
      if(v) {
        v.itens.filter(i=>i.status==='nc').forEach(it => {
          allNcs.push({ emp: v.empreendimentoNome, est: v.estruturaNome, data: v.dataHora, vistId: v.id, item: it });
        });
      }
    }
  }

  if(allNcs.length === 0) {
    container.innerHTML = '<div class="empty card" style="color:var(--conforme);">Nenhuma não conformidade encontrada no sistema! Parabéns!</div>';
    return;
  }

  const critWeight = {critica:4,alta:3,media:2,baixa:1};
  allNcs.sort((a,b) => (critWeight[b.item.criticidade]||0) - (critWeight[a.item.criticidade]||0));

  container.innerHTML = `
  <div class="card table-wrapper" style="border-color:var(--nc-bg);">
    <table>
      <thead><tr><th>Criticidade</th><th>Empreendimento / Estrutura</th><th>Item Reprovado</th><th>Recomendação</th><th>Data</th><th>Ação</th></tr></thead>
      <tbody>
        ${allNcs.map(nc => `
          <tr style="break-inside:avoid;">
            <td><span class="badge ${nc.item.criticidade}">${criticidadeLabel(nc.item.criticidade)}</span></td>
            <td><strong>${esc(nc.emp)}</strong><br><span style="font-size:12px;color:var(--ink-soft);">${esc(nc.est)}</span></td>
            <td style="max-width:250px;">${esc(nc.item.texto)}<br><em style="font-size:12px;color:var(--nc);">Obs: ${esc(nc.item.observacao)}</em></td>
            <td style="font-size:12.5px;">${esc(nc.item.recomendacao)||'—'}</td>
            <td style="font-size:12.5px;">${fmtDate(nc.data).split(' às')[0]}</td>
            <td class="no-print"><button class="btn ghost sm" onclick="abrirVistoria('${nc.vistId}')">Abrir</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

function bindNcs() {}

/* ============================================================
   INICIALIZAÇÃO E AUTENTICAÇÃO
   ============================================================ */
async function iniciarApp() {
  showToast('Carregando dados...');
  const syncOk = await syncGlobalNuvem();
  
  if(!syncOk) {
    const emp = await storageGet('empreendimentos');
    const est = await storageGet('estruturas');
    state.empreendimentos = emp || [];
    state.estruturas = est || [];
    await loadVistoriasNuvem();
  }

  if(state.estruturas.length === 0) {
    state.estruturas = DEFAULT_ESTRUTURAS;
    await storageSet('estruturas', state.estruturas);
    if(_supabase && navigator.onLine) {
      for(let e of state.estruturas) {
        await _supabase.from('estruturas').upsert({id: e.id, nome: e.nome, itens: {setor: e.setor, list: e.itens}});
      }
    }
  }
  
  state.ready = true;
  render();
}

async function checkAuth() {
  const loginScreen = document.getElementById('login-screen');
  
  if (!_supabase) {
    alert("AVISO: URL e Chave do Supabase não configuradas corretamente.");
    return;
  }
  const { data: { session } } = await _supabase.auth.getSession();
  
  if (session) {
    loginScreen.style.display = 'none';
    iniciarApp(); 
    return;
  }

  document.getElementById('btn-entrar').onclick = async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    if (error) alert('Falha no login.');
    else { loginScreen.style.display = 'none'; iniciarApp(); }
  };
}

document.getElementById('btn-logout').onclick = async () => {
  if (_supabase) { await _supabase.auth.signOut(); window.location.reload(); }
};

checkAuth();
</script>
