<style>

<script>
/* ============================================================
   CONFIGURAÇÃO DO BANCO DE DADOS SUPABASE
   ============================================================ */
const SUPABASE_URL = 'https://luvxmuhtemyloljnqgif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1dnhtdWh0ZW15bG9sam5xZ2lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NTE1MzcsImV4cCI6MjEwMDEyNzUzN30.inJ4fIL8ayPeg57snqeMRjFFwbSB1tZrCWQh0ytjXLA';

const _supabase = (window.supabase && SUPABASE_URL) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

/* ============================================================
   ESTADO E PERSISTÊNCIA
   ============================================================ */
const state = {
  view: 'dashboard',
  empreendimentos: [],
  estruturas: [],
  vistoriasIndex: [],
  ready: false,
  novaVistoria: null,
  vistoriaAberta: null
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function storageGet(key) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : null;
  } catch(e) { return null; }
}

async function storageSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch(e) { return false; }
}

/* --- SINCRONIZAÇÃO COMPLETA COM COMPATIBILIDADE DE SETOR --- */
async function syncGlobalNuvem(){
  if(!_supabase) return false;
  try {
    const [empReq, estReq] = await Promise.all([
      _supabase.from('empreendimentos').select('*'),
      _supabase.from('estruturas').select('*')
    ]);
    
    if(empReq.data && empReq.data.length > 0) {
      state.empreendimentos = empReq.data.map(d=>({id: d.id, nome: d.nome, tipo: d.tipo, estruturas: d.estruturas, criadoEm: d.criado_em}));
      await storageSet('empreendimentos', state.empreendimentos);
    }
    
    if(estReq.data && estReq.data.length > 0) {
      state.estruturas = estReq.data.map(d => {
        let itensArr = [];
        let setorVal = 'Geral';
        if (Array.isArray(d.itens)) {
          itensArr = d.itens;
          const def = DEFAULT_ESTRUTURAS.find(x => x.nome === d.nome);
          if (def) setorVal = def.setor;
        } else if (d.itens && typeof d.itens === 'object') {
          itensArr = d.itens.list || [];
          setorVal = d.itens.setor || 'Geral';
        }
        return { id: d.id, nome: d.nome, setor: setorVal, itens: itensArr };
      });
      await storageSet('estruturas', state.estruturas);
    }
    
    await loadVistoriasNuvem();
    return true;
  } catch(e) { console.error(e); return false; }
}

async function loadVistoriasNuvem(){
  if(_supabase){
    try{
      const { data, error } = await _supabase.from('vistorias').select('*').order('data_hora', { ascending: false });
      if(data && !error){
        state.vistoriasIndex = data.map(d => ({
          id: d.id,
          empreendimentoNome: d.empreendimento_nome,
          estruturaNome: d.estrutura_nome,
          responsavel: d.responsavel,
          dataHora: d.data_hora,
          totalItens: d.total_itens,
          totalNC: d.total_nc,
          criticidadeMax: d.criticidade_max,
          criticidades: (d.itens||[]).filter(i=>i.status==='nc').map(i=>i.criticidade)
        }));
        await storageSet('vistorias:index', state.vistoriasIndex);
      }
    }catch(e){}
  } else {
    state.vistoriasIndex = (await storageGet('vistorias:index')) || [];
  }
}

async function loadVistoria(id){ 
  if(_supabase){
    try{
      const { data } = await _supabase.from('vistorias').select('*').eq('id', id).single();
      if(data) return {
        id: data.id,
        empreendimentoNome: data.empreendimento_nome,
        estruturaNome: data.estrutura_nome,
        responsavel: data.responsavel,
        dataHora: data.data_hora,
        gps: data.gps,
        itens: data.itens
      };
    }catch(e){}
  }
  return await storageGet('vistoria:'+id); 
}

/* ============================================================
   FUNÇÕES PARA SALVAR E EXCLUIR VISTORIA NA NUVEM
   ============================================================ */
async function saveVistoria(v){
  const idx = state.vistoriasIndex.findIndex(x => x.id === v.id);
  const indexData = {
    id: v.id, empreendimentoNome: v.empreendimentoNome,
    estruturaNome: v.estruturaNome, responsavel: v.responsavel,
    dataHora: v.dataHora, totalItens: v.itens.length,
    totalNC: v.itens.filter(i=>i.status==='nc').length,
    criticidadeMax: v.itens.filter(i=>i.status==='nc').reduce((max,i)=> ({critica:4,alta:3,media:2,baixa:1}[i.criticidade]||0) > ({critica:4,alta:3,media:2,baixa:1}[max]||0) ? i.criticidade : max, null),
    criticidades: v.itens.filter(i=>i.status==='nc').map(i=>i.criticidade)
  };

  if(idx >= 0){
    state.vistoriasIndex[idx] = indexData;
  } else {
    state.vistoriasIndex.push(indexData);
  }

  await storageSet('vistorias:index', state.vistoriasIndex);
  await storageSet('vistoria:'+v.id, v);

  if(_supabase){
    const { error } = await _supabase.from('vistorias').upsert({
      id: v.id,
      empreendimento_nome: v.empreendimentoNome,
      estrutura_nome: v.estruturaNome,
      responsavel: v.responsavel,
      data_hora: v.dataHora,
      gps: v.gps,
      itens: v.itens,
      total_itens: v.itens.length,
      total_nc: v.itens.filter(i=>i.status==='nc').length,
      criticidade_max: indexData.criticidadeMax
    });
    if(error) {
      console.error("Erro no Supabase:", error);
      alert("Houve um erro ao enviar para a nuvem. Verifique sua internet.");
    }
  }
}

async function deleteVistoria(id){
  if(!confirm('Tem certeza de que deseja excluir esta vistoria? Esta ação não pode ser desfeita.')) return;
  showToast('Excluindo vistoria da Nuvem...');
  
  state.vistoriasIndex = state.vistoriasIndex.filter(v => v.id !== id);
  await storageSet('vistorias:index', state.vistoriasIndex);
  localStorage.removeItem('vistoria:'+id);

  if(_supabase){
    const { error } = await _supabase.from('vistorias').delete().eq('id', id);
    if(error){
      console.error("Erro ao excluir no Supabase:", error);
      alert("Erro ao excluir na nuvem.");
    }
  }

  state.vistoriaAberta = null;
  setView('vistorias');
  showToast('Vistoria excluída com sucesso.');
}

function editarVistoria(v){
  let emp = state.empreendimentos.find(e => e.nome === v.empreendimentoNome);
  let est = state.estruturas.find(e => e.nome === v.estruturaNome);
  
  const respostas = {};
  (v.itens || []).forEach(it => {
    respostas[it.itemId || it.id] = {
      status: it.status,
      observacao: it.observacao || '',
      criticidade: it.criticidade || 'media',
      recomendacao: it.recomendacao || '',
      fotos: it.fotos || []
    };
  });

  state.novaVistoria = {
    id: v.id,
    empreendimentoId: emp ? emp.id : null,
    estruturaId: est ? est.id : null,
    step: 3,
    respostas: respostas,
    gps: v.gps,
    responsavel: v.responsavel,
    dataHora: v.dataHora,
    itensOriginal: v.itens
  };

  setView('nova');
}

/* ============================================================
   AUTENTICAÇÃO REAL E SEGURA NO SUPABASE
   ============================================================ */
async function checkAuth(){
  const loginScreen = document.getElementById('login-screen');
  
  if(!_supabase) {
    alert("AVISO: URL e Chave do Supabase não configuradas no código!");
    return;
  }

  const { data: { session } } = await _supabase.auth.getSession();
  
  if (session) {
    loginScreen.style.display = 'none';
    iniciarApp(); 
    return;
  }

  const loginEmail = document.getElementById('login-email');
  const loginInput = document.getElementById('login-pass');
  const btnEntrar = document.getElementById('btn-entrar');
  
  async function tentarLogin() {
    const email = loginEmail.value.trim().toLowerCase();
    const pass = loginInput.value;

    if (!email.endsWith('@mapabase.com.br')) {
      alert('Acesso negado: É obrigatório utilizar um e-mail com domínio @mapabase.com.br!');
      return;
    }

    btnEntrar.textContent = 'Autenticando...';
    btnEntrar.disabled = true;

    const { data, error } = await _supabase.auth.signInWithPassword({
      email: email,
      password: pass,
    });

    if (error) {
      alert('Falha no login. Verifique seu e-mail e senha.');
      btnEntrar.textContent = 'Entrar na Plataforma';
      btnEntrar.disabled = false;
    } else {
      loginScreen.style.display = 'none';
      iniciarApp();
    }
  }

  btnEntrar.onclick = tentarLogin;
  loginInput.addEventListener("keyup", function(event) {
    if (event.key === "Enter") tentarLogin();
  });
}

document.getElementById('btn-logout').onclick = async () => {
  if(_supabase) {
    await _supabase.auth.signOut();
    window.location.reload();
  }
};

/* ============================================================
   INICIALIZAÇÃO DO APP APÓS LOGIN BEM-SUCEDIDO
   ============================================================ */
async function iniciarApp(){
  showToast('Sincronizando com a Nuvem...');
  const syncOk = await syncGlobalNuvem();
  
  if(!syncOk){
    const emp = await storageGet('empreendimentos');
    const est = await storageGet('estruturas');
    state.empreendimentos = emp || [];
    state.estruturas = est || [];
  }

  if(state.estruturas.length === 0){
    state.estruturas = DEFAULT_ESTRUTURAS;
    if(_supabase) {
      for(let e of state.estruturas){
        const payloadItens = { setor: e.setor, list: e.itens };
        await _supabase.from('estruturas').upsert({id: e.id, nome: e.nome, itens: payloadItens});
      }
    }
    await storageSet('estruturas', state.estruturas);
  }
  
  state.ready = true;
  render();
}

/* ============================================================
   HELPERS DE UI E FUNÇÕES COMUNS
   ============================================================ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.remove('show'), 2200);
}

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function criticidadeLabel(c){ return {baixa:'Baixa',media:'Média',alta:'Alta',critica:'Crítica'}[c] || c; }

function estruturaById(id){ return state.estruturas.find(e=>e.id===id); }
function empreendimentoById(id){ return state.empreendimentos.find(e=>e.id===id); }

function setView(v){
  state.view = v;
  render();
  window.scrollTo(0,0);
}

function fileToCompressedDataURL(file, maxDim=800, quality=0.55){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = h*(maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = w*(maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function getGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }),
      () => resolve(null),
      { timeout: 6000 }
    );
  });
}

const NAV = [
  {id:'dashboard', label:'Painel', ic:'&#9679;'},
  {id:'nova', label:'Nova vistoria', ic:'&#10133;'},
  {id:'vistorias', label:'Vistorias', ic:'&#128203;'},
  {id:'naoconformidades', label:'Não conformidades', ic:'&#9888;'},
  {id:'empreendimentos', label:'Empreendimentos', ic:'&#127970;'},
  {id:'estruturas', label:'Biblioteca de estruturas', ic:'&#128218;'},
];

function renderNav(){
  const el = document.getElementById('mainnav');
  el.innerHTML = NAV.map(n => `
    <button class="navbtn ${state.view===n.id?'active':''}" data-nav="${n.id}">
      <span class="ic">${n.ic}</span><span>${n.label}</span>
    </button>`).join('');
  
  el.querySelectorAll('[data-nav]').forEach(b=>{
    b.addEventListener('click', async ()=> {
      if(b.dataset.nav === 'nova') state.novaVistoria = null;
      
      if((b.dataset.nav === 'dashboard' || b.dataset.nav === 'vistorias') && _supabase){
        showToast('Atualizando dados da Nuvem...');
        await syncGlobalNuvem();
      }
      setView(b.dataset.nav);
    });
  });
}

/* ============================================================
   RENDER PRINCIPAL
   ============================================================ */
function render(){
  renderNav();
  const c = document.getElementById('content');
  if(!state.ready){ c.innerHTML = '<div class="empty">Carregando…</div>'; return; }
  switch(state.view){
    case 'dashboard': c.innerHTML = viewDashboard(); bindDashboard(); break;
    case 'empreendimentos': c.innerHTML = viewEmpreendimentos(); bindEmpreendimentos(); break;
    case 'estruturas': c.innerHTML = viewEstruturas(); bindEstruturas(); break;
    case 'nova': c.innerHTML = viewNovaVistoria(); bindNovaVistoria(); break;
    case 'vistorias': c.innerHTML = viewVistorias(); bindVistorias(); break;
    case 'vistoria-detalhe': c.innerHTML = viewVistoriaDetalhe(); bindVistoriaDetalhe(); break;
    case 'naoconformidades': c.innerHTML = viewNaoConformidades(); bindNaoConformidades(); break;
    default: c.innerHTML = '<div class="empty">Não encontrado</div>';
  }
}

function viewDashboard(){
  const total = state.vistoriasIndex.length;
  const totalItens = state.vistoriasIndex.reduce((s,v)=>s+(v.totalItens||0),0);
  const totalNC = state.vistoriasIndex.reduce((s,v)=>s+(v.totalNC||0),0);
  const conformidade = totalItens ? Math.round(100*(totalItens-totalNC)/totalItens) : 100;

  const porCrit = {baixa:0,media:0,alta:0,critica:0};
  state.vistoriasIndex.forEach(v=>{ (v.criticidades||[]).forEach(c=>{ if(porCrit[c]!==undefined) porCrit[c]++; }); });
  const maxCrit = Math.max(1,...Object.values(porCrit));

  const porEstrutura = {};
  state.vistoriasIndex.forEach(v=>{ porEstrutura[v.estruturaNome] = (porEstrutura[v.estruturaNome]||0) + (v.totalNC||0); });
  const rankEstrutura = Object.entries(porEstrutura).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxRank = Math.max(1,...rankEstrutura.map(r=>r[1]));

  const recentes = [...state.vistoriasIndex].sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora)).slice(0,6);

  return `
  <div class="view-head">
    <div><div class="eyebrow">Visão geral</div><h1 class="view-title">Painel de inspeções</h1>
    <div class="view-sub">Indicadores de vistorias de toda a equipe em tempo real.</div></div>
    <button class="btn primary" id="btn-nova-topo">+ Nova vistoria</button>
  </div>

  <div class="grid cols-4" style="margin-bottom:22px;">
    <div class="card kpi"><div class="num">${total}</div><div class="lbl">Vistorias realizadas</div></div>
    <div class="card kpi"><div class="num">${totalItens}</div><div class="lbl">Itens avaliados</div></div>
    <div class="card kpi" style="border-color:${totalNC?'var(--nc-bg)':'var(--line)'}"><div class="num" style="color:${totalNC?'var(--nc)':'var(--ink)'}">${totalNC}</div><div class="lbl">Não conformidades</div></div>
    <div class="card kpi"><div class="num">${conformidade}%</div><div class="lbl">Índice de conformidade</div></div>
  </div>

  <div class="grid cols-2" style="align-items:start;">
    <div class="card card-pad">
      <h3 style="margin:0 0 14px;font-family:var(--font-display);font-size:20px;font-weight:600;">Não conformidades por criticidade</h3>
      ${['critica','alta','media','baixa'].map(k=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:70px;font-size:12.5px;color:var(--ink-soft);">${criticidadeLabel(k)}</div>
          <div style="flex:1;background:var(--surface-2);border-radius:6px;height:16px;overflow:hidden;">
            <div style="width:${(porCrit[k]/maxCrit*100)||0}%;height:100%;background:var(--${k});"></div>
          </div>
          <div style="width:24px;text-align:right;font-family:var(--font-mono);font-size:12.5px;">${porCrit[k]}</div>
        </div>`).join('') || '<div class="hint">Sem dados ainda.</div>'}
    </div>
    <div class="card card-pad">
      <h3 style="margin:0 0 14px;font-family:var(--font-display);font-size:20px;font-weight:600;">Estruturas com mais não conformidades</h3>
      ${rankEstrutura.length ? rankEstrutura.map(([nome,n])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:150px;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(nome)}</div>
          <div style="flex:1;background:var(--surface-2);border-radius:6px;height:16px;overflow:hidden;">
            <div style="width:${(n/maxRank*100)}%;height:100%;background:var(--accent);"></div>
          </div>
          <div style="width:24px;text-align:right;font-family:var(--font-mono);font-size:12.5px;">${n}</div>
        </div>`).join('') : '<div class="hint">Sem dados ainda.</div>'}
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <div style="padding:16px 20px 0;"><h3 style="margin:0 0 4px;font-family:var(--font-display);font-size:20px;font-weight:600;">Vistorias recentes da Equipe</h3></div>
    ${recentes.length ? `<table style="margin-top:8px;"><thead><tr><th>Data</th><th>Empreendimento</th><th>Estrutura</th><th>Responsável</th><th>NC</th><th>Criticidade</th></tr></thead><tbody>
      ${recentes.map(v=>`
        <tr class="clickable" data-open="${v.id}">
          <td>${fmtDate(v.dataHora)}</td>
          <td>${esc(v.empreendimentoNome)}</td>
          <td>${esc(v.estruturaNome)}</td>
          <td>${esc(v.responsavel||'—')}</td>
          <td>${v.totalNC>0?`<span class="badge nc">${v.totalNC} NC</span>`:`<span class="badge conforme">OK</span>`}</td>
          <td>${v.criticidadeMax ? `<span class="badge ${v.criticidadeMax}">${criticidadeLabel(v.criticidadeMax)}</span>` : '—'}</td>
        </tr>`).join('')}
    </tbody></table>` : `<div class="empty"><div class="ic">&#128203;</div>Nenhuma vistoria registrada ainda.<br><br><button class="btn primary" id="btn-nova-vazio">Iniciar primeira vistoria</button></div>`}
  </div>`;

function empreendimentoModal(existing){
  const isEdit = !!existing;
  const sel = new Set(existing?.estruturas || []);
  const modal = document.getElementById('modal-root');

  const setores = [
    { key: 'Geral', titulo: '⚙️ Comum / Geral' },
    { key: 'Agro', titulo: '🌱 Agronegócio' },
    { key: 'Mineração', titulo: '⛏️ Mineração' }
  ];

  modal.innerHTML = `
  <div class="modal-backdrop" id="modal-bg">
    <div class="modal" style="max-width:620px;">
      <div class="modal-head"><h3>${isEdit?'Editar empreendimento':'Novo empreendimento'}</h3><button class="btn ghost sm" id="modal-close">✕</button></div>
      <div class="modal-body">
        <div class="field"><label class="field-label">Nome do empreendimento</label>
          <input type="text" id="emp-nome" value="${esc(existing?.nome||'')}" placeholder="Ex.: Fazenda Boa Vista ou Mina Central"></div>
        <div class="field"><label class="field-label">Tipo de Empreendimento</label>
          <select id="emp-tipo">
            <option value="Agronegócio" ${existing?.tipo==='Agronegócio'?'selected':''}>Agronegócio / Agro</option>
            <option value="Mineração" ${existing?.tipo==='Mineração'?'selected':''}>Mineração</option>
            <option value="Indústria / Geral" ${existing?.tipo==='Indústria / Geral'?'selected':''}>Indústria / Geral</option>
          </select>
        </div>
        <div class="field"><label class="field-label">Estruturas vinculadas ao empreendimento</label>
          <div id="emp-estruturas">
            ${setores.map(s => {
              const ests = state.estruturas.filter(e => (e.setor || 'Geral') === s.key);
              if(!ests.length) return '';
              return `
                <div style="margin-top:12px;margin-bottom:6px;font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;">${s.titulo}</div>
                <div class="chiprow">
                  ${ests.map(e => `<button type="button" class="chip ${sel.has(e.id)?'sel':''}" data-est="${e.id}">${esc(e.nome)}</button>`).join('')}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="modal-foot">
        ${isEdit?'<button class="btn danger" id="emp-del">Excluir</button>':''}
        <div class="spacer"></div>
        <button class="btn ghost" id="modal-cancel">Cancelar</button>
        <button class="btn primary" id="emp-salvar">Salvar na Nuvem</button>
      </div>
    </div>
  </div>`;

  const close = ()=> modal.innerHTML='';
  document.getElementById('modal-close').onclick = close;
  document.getElementById('modal-cancel').onclick = close;
  document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });
  modal.querySelectorAll('[data-est]').forEach(b=>{
    b.onclick = ()=>{ b.classList.toggle('sel'); };
  });

  if(isEdit){
    document.getElementById('emp-del').onclick = async ()=>{
      if(!confirm('Excluir este empreendimento? As vistorias já realizadas serão mantidas.')) return;
      state.empreendimentos = state.empreendimentos.filter(e=>e.id!==existing.id);
      await storageSet('empreendimentos', state.empreendimentos);
      if(_supabase) await _supabase.from('empreendimentos').delete().eq('id', existing.id);
      close(); render(); showToast('Empreendimento excluído.');
    };
  }

  document.getElementById('emp-salvar').onclick = async ()=>{
    const nome = document.getElementById('emp-nome').value.trim();
    if(!nome){ showToast('Informe o nome do empreendimento.'); return; }
    const tipo = document.getElementById('emp-tipo').value;
    const estruturas = [...modal.querySelectorAll('[data-est].sel')].map(b=>b.dataset.est);
    
    let empObj;
    if(isEdit){
      Object.assign(existing, {nome, tipo, estruturas});
      empObj = existing;
    } else {
      empObj = { id: uid(), nome, tipo, estruturas, criadoEm: new Date().toISOString() };
      state.empreendimentos.push(empObj);
    }
    
    await storageSet('empreendimentos', state.empreendimentos);
    if(_supabase) {
      await _supabase.from('empreendimentos').upsert({ id: empObj.id, nome: empObj.nome, tipo: empObj.tipo, estruturas: empObj.estruturas, criado_em: empObj.criadoEm });
    }
    
    close(); render(); showToast('Empreendimento salvo.');
  };
}

  }).join('')}
  `;
}

function estruturaModal(existing){
  const isEdit = !!existing;
  const itens = isEdit ? existing.itens.map(i=>({...i})) : [];
  const modal = document.getElementById('modal-root');

  function renderItens(){
    return itens.map((it,idx)=>`
      <div class="rowflex" style="margin-bottom:8px;" data-itemrow="${idx}">
        <input type="text" value="${esc(it.texto)}" data-itemtxt="${idx}" placeholder="Texto do item de inspeção" style="flex:1;">
        <input type="text" value="${esc(it.categoria||'')}" data-itemcat="${idx}" placeholder="Categoria (opcional)" style="width:140px;">
        <button class="btn ghost sm" data-itemdel="${idx}">✕</button>
      </div>`).join('');
  }

  modal.innerHTML = `
  <div class="modal-backdrop" id="modal-bg">
    <div class="modal" style="max-width:640px;">
      <div class="modal-head"><h3>${isEdit?'Editar estrutura':'Nova estrutura'}</h3><button class="btn ghost sm" id="modal-close">✕</button></div>
      <div class="modal-body">
        <div class="grid cols-2">
          <div class="field"><label class="field-label">Nome da estrutura</label>
            <input type="text" id="est-nome" value="${esc(existing?.nome||'')}" placeholder="Ex.: Silo de Armazenamento"></div>
          <div class="field"><label class="field-label">Setor / Categoria</label>
            <select id="est-setor">
              <option value="Geral" ${(existing?.setor||'Geral')==='Geral'?'selected':''}>⚙️ Comum / Geral</option>
              <option value="Agro" ${existing?.setor==='Agro'?'selected':''}>🌱 Agronegócio</option>
              <option value="Mineração" ${existing?.setor==='Mineração'?'selected':''}>⛏️ Mineração</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Itens de inspeção</label>
          <div id="itens-lista">${renderItens()}</div>
          <button class="btn ghost sm" id="est-add-item" style="margin-top:6px;">+ Adicionar item</button>
        </div>
      </div>
      <div class="modal-foot">
        ${isEdit?'<button class="btn danger" id="est-del">Excluir estrutura</button>':''}
        <div class="spacer"></div>
        <button class="btn ghost" id="modal-cancel">Cancelar</button>
        <button class="btn primary" id="est-salvar">Salvar na Nuvem</button>
      </div>
    </div>
  </div>`;

  const close = ()=> modal.innerHTML='';
  document.getElementById('modal-close').onclick = close;
  document.getElementById('modal-cancel').onclick = close;
  document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target.id==='modal-bg') close(); });

  function refreshList(){ document.getElementById('itens-lista').innerHTML = renderItens(); bindItemRows(); }
  function bindItemRows(){
    document.querySelectorAll('[data-itemtxt]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemtxt].texto = inp.value; });
    document.querySelectorAll('[data-itemcat]').forEach(inp=> inp.oninput = ()=>{ itens[+inp.dataset.itemcat].categoria = inp.value; });
    document.querySelectorAll('[data-itemdel]').forEach(b=> b.onclick = ()=>{ itens.splice(+b.dataset.itemdel,1); refreshList(); });
  }
  bindItemRows();
  document.getElementById('est-add-item').onclick = ()=>{ itens.push({id:uid(),texto:'',categoria:''}); refreshList(); };

  if(isEdit){
    document.getElementById('est-del').onclick = async ()=>{
      if(!confirm('Excluir esta estrutura da biblioteca? Isso não afeta vistorias já realizadas.')) return;
      state.estruturas = state.estruturas.filter(e=>e.id!==existing.id);
      state.empreendimentos.forEach(e=> e.estruturas = e.estruturas.filter(id=>id!==existing.id));
      
      await storageSet('estruturas', state.estruturas);
      await storageSet('empreendimentos', state.empreendimentos);
      if(_supabase) await _supabase.from('estruturas').delete().eq('id', existing.id);
      
      close(); render(); showToast('Estrutura excluída.');
    };
  }

  document.getElementById('est-salvar').onclick = async ()=>{
    const nome = document.getElementById('est-nome').value.trim();
    if(!nome){ showToast('Informe o nome da estrutura.'); return; }
    const setor = document.getElementById('est-setor').value;
    const itensLimpos = itens.filter(i=>i.texto.trim()).map(i=>({id:i.id||uid(), texto:i.texto.trim(), categoria: i.categoria?.trim()||null}));
    
    let estObj;
    if(isEdit){ 
      Object.assign(existing, {nome, setor, itens: itensLimpos}); 
      estObj = existing;
    } else { 
      estObj = { id: uid(), nome, setor, itens: itensLimpos };
      state.estruturas.push(estObj); 
    }
    
    await storageSet('estruturas', state.estruturas);
    if(_supabase) {
      const payloadItens = { setor: estObj.setor, list: estObj.itens };
      await _supabase.from('estruturas').upsert({ id: estObj.id, nome: estObj.nome, itens: payloadItens });
    }
    
    close(); render(); showToast('Estrutura salva.');
  };
}

    <button class="btn ghost" id="btn-voltar-1">← Trocar empreendimento</button></div>

    ${opts.length ? `<div class="grid cols-3">
      ${opts.map(e=>`
        <div class="card card-pad" data-pickest="${e.id}" style="cursor:pointer;">
          <div style="font-family:var(--font-display);font-size:20px;font-weight:600;">${esc(e.nome)}</div>
          <div class="hint" style="margin-top:4px;">${e.itens.length} item(ns) de checklist</div>
        </div>`).join('')}
    </div>` : `<div class="empty card"><div class="ic">&#128218;</div>Este empreendimento ainda não tem estruturas vinculadas.<br><br><button class="btn primary" id="btn-editar-emp-estruturas">Vincular estruturas</button></div>`}
    `;
  }
  
  // Step 3 - Checklist
  const emp = empreendimentoById(nv.empreendimentoId) || { nome: nv.empreendimentoNome || 'Empreendimento' };
  const est = estruturaById(nv.estruturaId) || { nome: nv.estruturaNome || 'Estrutura', itens: [] };
  
  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []);
  if(!itensLista.length && nv.respostas){
    itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null }));
  }

  const respondidos = itensLista.filter(it => nv.respostas[it.id]?.status).length;
  const pct = itensLista.length ? Math.round(100*respondidos/itensLista.length) : 0;

  let categorias = [...new Set(itensLista.map(i=>i.categoria).filter(Boolean))];
  let itensPorCat = categorias.length ? categorias.map(c=>({cat:c, itens: itensLista.filter(i=>i.categoria===c)})) : [{cat:null, itens: itensLista}];

  let dataHoraFormatted = '';
  if (nv.dataHora) {

  }

  return `

    <div><div class="eyebrow">${esc(emp.nome)} · ${esc(est.nome)}</div><h1 class="view-title">${nv.id ? 'Editar Vistoria' : 'Checklist de inspeção'}</h1></div>

          <button class="btn ghost sm" id="nv-gps-btn" type="button">${nv.gps?'Recapturar':'Capturar GPS'}</button>
        </div>
      </div>
    </div>
  </div>

  <div class="rowflex" style="margin-bottom:14px;">
    <div class="progressbar" style="flex:1;"><div style="width:${pct}%"></div></div>
    <div class="hint" style="white-space:nowrap;">${respondidos}/${itensLista.length} respondidos</div>
  </div>

  ${itensPorCat.map(grupo=>`
    ${grupo.cat ? `<div class="eyebrow" style="margin:18px 0 8px;">${esc(grupo.cat)}</div>` : ''}
    ${grupo.itens.map((it, i)=>renderChecklistItem(it, nv, itensLista.indexOf(it)+1)).join('')}

        <button type="button" class="n ${r.status==='nc'?'active':''}" data-status="nc">NÃO CONF.</button>

    </div>

      <div class="field" style="margin-bottom:10px;">
        <label class="field-label">Observação</label>
        <textarea data-obs="${it.id}" placeholder="Descreva a não conformidade observada...">${esc(r.observacao)}</textarea>
      </div>
      <div class="grid cols-2">
        <div class="field" style="margin-bottom:10px;">
          <label class="field-label">Criticidade</label>
          <select data-crit="${it.id}">
            ${['baixa','media','alta','critica'].map(c=>`<option value="${c}" ${r.criticidade===c?'selected':''}>${criticidadeLabel(c)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin-bottom:10px;">
          <label class="field-label">Recomendação técnica</label>
          <input type="text" data-rec="${it.id}" value="${esc(r.recomendacao)}" placeholder="Ação corretiva sugerida">
        </div>
      </div>
      <label class="field-label">Fotos (Câmera ou Galeria)</label>
      <div class="photo-row" data-photos="${it.id}">
        ${r.fotos.map((f,i)=>`<img class="photo-thumb" src="${f}" data-photoidx="${i}">`).join('')}
        <label class="photo-add">＋<input type="file" accept="image/*" multiple data-photoinput="${it.id}" style="display:none;"></label>

function bindNovaVistoria(){
  const nv = state.novaVistoria;
  if(!nv || nv.step===1){
    document.querySelectorAll('[data-pickemp]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.novaVistoria = { empreendimentoId: el.dataset.pickemp, estruturaId:null, step:2, respostas:{}, gps:null, responsavel:'', dataHora: '' };
        render();
      });
    });
    document.getElementById('btn-ir-emp')?.addEventListener('click', ()=> setView('empreendimentos'));
    return;
  }
  if(nv.step===2){
    document.getElementById('btn-voltar-1')?.addEventListener('click', ()=>{ nv.step=1; render(); });
    document.getElementById('btn-editar-emp-estruturas')?.addEventListener('click', ()=>{
      empreendimentoModal(empreendimentoById(nv.empreendimentoId));
    });
    document.querySelectorAll('[data-pickest]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        nv.estruturaId = el.dataset.pickest;
        nv.step = 3;
        render();
        const gps = await getGPS();
        if(gps){ nv.gps = gps; if(state.view==='nova') render(); }
      });
    });
    return;
  }
  // Step 3
  document.getElementById('btn-voltar-2')?.addEventListener('click', ()=>{ nv.step=2; render(); });
  document.getElementById('nv-responsavel')?.addEventListener('input', e=>{ nv.responsavel = e.target.value; });
  document.getElementById('nv-datahora')?.addEventListener('change', e=>{ 
    if(e.target.value) nv.dataHora = new Date(e.target.value).toISOString(); 
  });
  document.getElementById('nv-gps-btn')?.addEventListener('click', async ()=>{
    document.getElementById('nv-gps-txt').textContent = 'Capturando...';
    const gps = await getGPS();
    nv.gps = gps;
    document.getElementById('nv-gps-txt').textContent = gps ? `${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)}` : 'Indisponível neste dispositivo/navegador';
  });

  document.querySelectorAll('[data-seg]').forEach(seg=>{
    seg.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = seg.dataset.seg;
        state.novaVistoria.respostas[id].status = btn.dataset.status;
        render();
      });
    });
  });
  document.querySelectorAll('[data-obs]').forEach(t=> t.addEventListener('input', e=>{ nv.respostas[t.dataset.obs].observacao = e.target.value; }));
  document.querySelectorAll('[data-crit]').forEach(s=> s.addEventListener('change', e=>{ nv.respostas[s.dataset.crit].criticidade = e.target.value; }));
  document.querySelectorAll('[data-rec]').forEach(i=> i.addEventListener('input', e=>{ nv.respostas[i.dataset.rec].recomendacao = e.target.value; }));
  document.querySelectorAll('[data-photoinput]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const id = inp.dataset.photoinput;
      const files = [...inp.files];
      showToast('Processando foto(s)...');
      for(const f of files){
        try{
          const dataUrl = await fileToCompressedDataURL(f);
          nv.respostas[id].fotos.push(dataUrl);
        }catch(e){ console.error(e); }
      }
      render();
    });
  });
  document.querySelectorAll('[data-photoidx]').forEach(img=>{
    img.addEventListener('click', ()=>{
      const wrap = img.closest('[data-photos]');
      const id = wrap.dataset.photos;
      if(confirm('Remover esta foto?')){
        nv.respostas[id].fotos.splice(+img.dataset.photoidx,1);
        render();
      }
    });
  });

  document.getElementById('nv-finalizar')?.addEventListener('click', finalizarVistoria);
}

async function finalizarVistoria(){
  const nv = state.novaVistoria;
  const emp = empreendimentoById(nv.empreendimentoId) || { id: nv.empreendimentoId, nome: nv.empreendimentoNome || 'Empreendimento' };
  const est = estruturaById(nv.estruturaId) || { id: nv.estruturaId, nome: nv.estruturaNome || 'Estrutura', itens: [] };
  const btn = document.getElementById('nv-finalizar');
  
  if (!nv.dataHora) {
    showToast('Por favor, informe a Data e Hora da Vistoria.');
    return;
  }
  
  btn.disabled = true; btn.textContent = 'Enviando para a Nuvem...';

  let itensLista = est.itens.length ? est.itens : (nv.itensOriginal || []);
  if(!itensLista.length && nv.respostas){
    itensLista = Object.keys(nv.respostas).map(id => ({ id: id, texto: 'Item de Inspeção', categoria: null }));
  }

  const itensResp = itensLista.map(it=>{
    const r = nv.respostas[it.id] || {status:null};
    return {
      itemId: it.id, texto: it.texto, categoria: it.categoria,
      status: r.status || 'na',
      observacao: r.observacao || '',
      criticidade: r.status==='nc' ? (r.criticidade||'media') : null,
      recomendacao: r.status==='nc' ? (r.recomendacao||'') : '',
      fotos: r.fotos || [],
    };
  });

  const vistoria = {
    id: nv.id || uid(),
    empreendimentoId: emp.id, empreendimentoNome: emp.nome,
    estruturaId: est.id, estruturaNome: est.nome,
    responsavel: nv.responsavel || '—',
    dataHora: nv.dataHora,
    gps: nv.gps,
    itens: itensResp,
  };
  
  await saveVistoria(vistoria);
  await loadVistoriasNuvem();

  state.novaVistoria = null;
  state.vistoriaAberta = vistoria;
  setView('vistoria-detalhe');
  showToast('Vistoria salva com sucesso na Nuvem!');
}

    </tbody>
  </table></div>

  <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">Não conformidades e plano de ação</h3>
  ${nc.length ? `<div class="card" style="margin-bottom:22px;"><table>
    <thead><tr><th>Item</th><th>Criticidade</th><th>Recomendação técnica</th></tr></thead><tbody>
    ${nc.map(it=>`
      <tr>
        <td style="max-width:300px;">${esc(it.texto)}</td>
        <td><span class="badge ${it.criticidade}">${criticidadeLabel(it.criticidade)}</span></td>
        <td>${esc(it.recomendacao)||'<span class="hint">Não informada</span>'}</td>
      </tr>`).join('')}
  </tbody></table></div>` : `<div class="card card-pad" style="margin-bottom:22px;color:var(--conforme);font-weight:600;">Nenhuma não conformidade identificada nesta vistoria.</div>`}

  <h3 style="font-family:var(--font-display);font-size:22px;font-weight:600;margin:0 0 10px;">Relatório fotográfico</h3>
  ${v.itens.some(i=>i.fotos?.length) ? v.itens.filter(i=>i.fotos?.length).map(it=>`
    <div class="card card-pad" style="margin-bottom:14px;">
      <div style="font-weight:600;margin-bottom:8px;">${esc(it.texto)}</div>
      <div class="photo-row">${it.fotos.map(f=>`<img class="photo-thumb" style="width:120px;height:120px;" src="${f}">`).join('')}</div>
    </div>`).join('') : `<div class="card card-pad hint">Nenhuma foto anexada.</div>`}
  `;
}

function bindVistoriaDetalhe(){
  const v = state.vistoriaAberta;
  document.getElementById('btn-excluir-vistoria')?.addEventListener('click', ()=> deleteVistoria(v.id));
  document.getElementById('btn-editar-vistoria')?.addEventListener('click', ()=> editarVistoria(v));
  document.getElementById('btn-voltar-lista')?.addEventListener('click', ()=> setView('vistorias'));
  document.getElementById('btn-imprimir')?.addEventListener('click', ()=> window.print());
}

/* ============================================================
   NÃO CONFORMIDADES (VISÃO CONSOLIDADA)
   ============================================================ */
function viewNaoConformidades(){
  return `
  <div class="view-head"><div><div class="eyebrow">Consolidado</div><h1 class="view-title">Não conformidades</h1>
  <div class="view-sub">Carregando itens não conformes de todas as vistorias...</div></div></div>
  <div id="nc-list"><div class="empty">Carregando…</div></div>`;
}
async function bindNaoConformidades(){
  const withNC = state.vistoriasIndex.filter(v=>v.totalNC>0).sort((a,b)=> new Date(b.dataHora)-new Date(a.dataHora));
  const rows = [];
  for(const idx of withNC){
    const v = await loadVistoria(idx.id);
    if(!v) continue;
    v.itens.filter(i=>i.status==='nc').forEach(it=>{
      rows.push({ vistoriaId: v.id, empreendimento: v.empreendimentoNome, estrutura: v.estruturaNome, dataHora: v.dataHora, ...it });
    });
  }
  const el = document.getElementById('nc-list');
  if(!el) return;
  if(!rows.length){ el.innerHTML = '<div class="empty card"><div class="ic">&#10004;</div>Nenhuma não conformidade registrada.</div>'; return; }
  rows.sort((a,b)=> ({critica:4,alta:3,media:2,baixa:1}[b.criticidade]||0) - ({critica:4,alta:3,media:2,baixa:1}[a.criticidade]||0));
  el.innerHTML = `<div class="card"><table>
    <thead><tr><th>Criticidade</th><th>Empreendimento</th><th>Estrutura</th><th>Item</th><th>Recomendação</th><th>Data</th></tr></thead>
    <tbody>
    ${rows.map(r=>`
      <tr class="clickable" data-openvist="${r.vistoriaId}">
        <td><span class="badge ${r.criticidade}">${criticidadeLabel(r.criticidade)}</span></td>
        <td>${esc(r.empreendimento)}</td>
        <td>${esc(r.estrutura)}</td>
        <td style="max-width:280px;">${esc(r.texto)}</td>
        <td style="max-width:220px;">${esc(r.recomendacao)||'—'}</td>
        <td>${fmtDate(r.dataHora)}</td>
      </tr>`).join('')}
    </tbody></table></div>`;
  el.querySelectorAll('[data-openvist]').forEach(tr=>{
    tr.addEventListener('click', async ()=>{
      const v = await loadVistoria(tr.dataset.openvist);
      state.vistoriaAberta = v;
      setView('vistoria-detalhe');
    });
  });
}
